/* ======= DAILY ADVICE (Восстановление / Питание / Вода) ======= */
// Пункт 2: тактическая рекомендация — сперва пробуем найти явный темп/пульс
// в тексте самого плана тренера, если нет — общий тактический совет по типу.
function getTacticalTip(todayPlan){
  if(!todayPlan||todayPlan.type==='rest')return null;
  const paceMatch=todayPlan.desc.match(/темп[е]?\s*(\d:\d\d)(?:[–\-](\d:\d\d))?/i);
  const hrMatch=todayPlan.desc.match(/до\s*(\d{2,3})/i);
  if(paceMatch)return`Держи темп ${paceMatch[1]}${paceMatch[2]?`–${paceMatch[2]}`:''} на км — это ориентир из плана тренера, не отклоняйся в первые километры.`;
  if(hrMatch)return`Следи за пульсом — держи его в районе ${hrMatch[1]} уд/мин, особенно в первой трети тренировки.`;
  const TACTIC_BY_TYPE={
    interval:'На отрезках — ровный темп от первого до последнего повторения, не старайся ускоряться к концу.',
    tempo:'Держи заявленный темп с первых метров — «разгон» в середине темповой обычно означает, что старт был слишком лёгким.',
    long:'Первую треть дистанции беги заметно легче, чем кажется нужным — темп догонишь во второй половине.',
    easy:'Темп разговорный — если сбивается дыхание для разговора, ты бежишь слишком быстро для кросса.',
    race:'Не форсируй первые 2 км — дай телу выйти на рабочий пульс, ускорение оставь на вторую половину.',
    strength:'Держи технику важнее числа повторений — лучше меньше подходов, но чисто.',
  };
  return TACTIC_BY_TYPE[todayPlan.type]||null;
}
// Пункт 5: список витаминов вместо одного текстового поля — с автомиграцией
// старого формата (body_vitamins_text/since/effect) при первом обращении.
const VITAMINS_KEY='vitamins_list';
function getVitaminsList(){
  const raw=localStorage.getItem(VITAMINS_KEY);
  if(raw){try{return JSON.parse(raw);}catch{return[];}}
  // Миграция: если новый ключ ещё не создавался, но есть старые данные — конвертируем один раз
  const oldText=localStorage.getItem('body_vitamins_text')||'';
  if(oldText.trim()){
    const migrated=[{
      id:Date.now(),name:oldText.trim(),
      startDate:localStorage.getItem('body_vitamins_since')||'',
      effect:localStorage.getItem('body_vitamins_effect')||'',
    }];
    localStorage.setItem(VITAMINS_KEY,JSON.stringify(migrated));
    return migrated;
  }
  return[];
}
function saveVitaminsList(list){localStorage.setItem(VITAMINS_KEY,JSON.stringify(list));}

// Пункт 2/5: короткая заметка о текущем приёме витаминов — теперь собирается
// из всего списка, а не одного поля; встраивается в блок «Восстановление»
function getVitaminsNote(){
  const list=getVitaminsList();
  if(list.length===0)return'';
  const parts=list.map(v=>{
    if(!v.effect||!v.effect.trim())return v.name;
    const dashMatch=v.effect.match(/[—\-]\s*(.+)/);
    let effectPhrase=(dashMatch?dashMatch[1]:v.effect).trim();
    effectPhrase=effectPhrase.charAt(0).toLowerCase()+effectPhrase.slice(1);
    if(!/[.!?]$/.test(effectPhrase))effectPhrase+='.';
    return`${v.name} (${effectPhrase.replace(/\.$/,'')})`;
  });
  return`Ты принимаешь: ${parts.join('; ')}.`;
}


// Пункт 2: детальные рекомендации по времени тренировки — используются как
// дополнение к базовому совету дня, а не замена (питание/восстановление/вода).
function getTimeOfDayAdvice(timeOfDay){
  if(timeOfDay==='morning')return{
    nutrition:' Ужин накануне — лёгкий, без тяжёлой пищи. Завтрак за 1–1.5 часа до тренировки: каша, тост с мёдом или банан. После тренировки — полноценный завтрак с белком и углеводами (яйца, творог, овсянка).',
    recovery:' Сделай акцент на плотный завтрак после тренировки и, если получится, дневной сон 20–30 минут — это компенсирует раннюю нагрузку.',
    water:' 200–300 мл воды перед тренировкой, ещё немного сразу после, остальное — равномерно в течение дня.',
  };
  if(timeOfDay==='evening')return{
    nutrition:' Плотный обед за 3–4 часа до тренировки. Лёгкий перекус за 1–2 часа — банан или йогурт. После тренировки — ужин с белком и углеводами в течение часа, не откладывай на утро.',
    recovery:' Приоритет вечером — контрастный душ, растяжка и полноценный сон сразу после восстановления пульса.',
    water:' Пей равномерно в течение дня, после тренировки — восполни электролиты (щепотка соли или изотоник).',
  };
  return null; // время не определено — нейтральные рекомендации без изменений
}
// Пункт 3: предупреждение, если физический ресурс сейчас ниже 60%
function getLowResourceWarning(){
  const {total:baseTotal}=calcBodyResource();
  const manualAdj=Number(localStorage.getItem('body_resource_adjustment')||0);
  const resourceTotal=Math.max(0,Math.min(100,baseTotal+manualAdj));
  return resourceTotal<60?` ⚠️ Твой физический ресурс сейчас ${resourceTotal}% — сегодня стоит снизить нагрузку относительно плана.`:'';
}

function getDailyAdvice(parsedDays,selectedDayIdx,manualTimeOfDay){
  const jsDow=new Date().getDay();
  const todayIdx=jsDow===0?6:jsDow-1;
  // Если день выбран кликом по карточке — используем его вместо реального "сегодня"
  const activeIdx=(selectedDayIdx!==null&&selectedDayIdx!==undefined)?selectedDayIdx:todayIdx;
  const isRealToday=activeIdx===todayIdx;
  const tomorrowIdx=(activeIdx+1)%7;
  const todayPlan=parsedDays.find(d=>d.dayIdx===activeIdx);
  const tomorrowPlan=parsedDays.find(d=>d.dayIdx===tomorrowIdx);
  const intensity=todayPlan?todayPlan.intensity:'medium';
  const recoveryProcs=localStorage.getItem('recoveryProcedures')||'';
  const nearestRace=getNearestRace();
  const dayWord=isRealToday?'Сегодня':`В ${todayPlan?todayPlan.day:'этот день'}`;

  // Текущий транзит (статический пример — согласован с остальным приложением)
  const moonSign='Скорпион'; // водный знак — благоприятен для водных процедур
  const moonWater=true;

  let recovery,nutrition,water,astro;
  // Пункт 4: ручной выбор времени тренировки (если задан) имеет приоритет
  // над автоопределением из текста плана; 'auto' или пусто — используем то,
  // что определил parsePlan для конкретного дня.
  const effectiveTimeOfDay=(manualTimeOfDay&&manualTimeOfDay!=='auto')?manualTimeOfDay:(todayPlan?todayPlan.timeOfDay:null);
  const timeAdvice=getTimeOfDayAdvice(effectiveTimeOfDay);
  const timeSuffix={recovery:timeAdvice?timeAdvice.recovery:'',nutrition:timeAdvice?timeAdvice.nutrition:'',water:timeAdvice?timeAdvice.water:''};
  const procsNote=recoveryProcs?` Учитывая твои процедуры (${recoveryProcs.slice(0,60)}${recoveryProcs.length>60?'…':''}), сегодня — хороший повод их выполнить.`:'';
  const tomorrowHint=tomorrowPlan&&(tomorrowPlan.intensity==='high')?` На следующий день у тебя ${tomorrowPlan.label.toLowerCase()} — сегодня вечером особенно важно лечь пораньше.`:'';

  // Если старт близко (≤5 дней) — приоритет смещается на подводку и снижение риска
  const raceClose=isRealToday&&nearestRace&&nearestRace.daysLeft<=5;
  const raceSoonNote=raceClose
    ?` Через ${nearestRace.daysLeft} ${nearestRace.daysLeft===1?'день':nearestRace.daysLeft<5?'дня':'дней'} у тебя старт (${nearestRace.distance}) — сейчас важнее не нагрузка, а свежесть ног.`
    :'';

  // Пункт 1/2: тип тренировки на сегодня — 'rest', если плана нет или день отдыха
  const trainType=todayPlan?todayPlan.type:'rest';

  if(raceClose){
    recovery=`До старта «${nearestRace.distance}» осталось ${nearestRace.daysLeft} дн. — снижай объём, добавь лёгкую растяжку и полноценный сон (8ч+). Никаких новых экспериментов с телом перед стартом.`;
    nutrition=`Углеводная загрузка: увеличь долю углеводов до 60–65% рациона за 2–3 дня до старта. Последний тяжёлый приём пищи — не позже, чем за 3 часа до забега.`;
    water=`2.8–3.2 л, с акцентом на электролиты в последние сутки перед стартом. Не экспериментируй с новыми напитками в день забега.`;
  } else if(trainType==='interval'){
    // Интервалы → акцент на восстановление, углеводы после, электролиты
    recovery=`${dayWord} интервалы${todayPlan?` (${todayPlan.label.toLowerCase()})`:''} — самая нагрузочная работа для нервной системы и мышц. Приоритет вечером: 15–20 мин растяжки, контрастный душ или бассейн — снимает накопленное напряжение. Баня/сауна возможна, но дай телу 2–3 часа остыть после тренировки. Массаж лучше перенести на завтра.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`Сразу после — творог с бананом или протеиновый коктейль с бананом в течение 30–40 минут (белок+углеводы 1:3 — быстро восполняет гликоген, потраченный на отрезках). Через 1.5–2 часа — полноценный приём: курица или рыба с гречкой/рисом и овощами.${timeSuffix.nutrition||' Перед самой тренировкой — только лёгкий перекус за час-полтора, не наедайся.'}`;
    water=`3.0–3.5 л сегодня. Обязательно электролиты (щепотка соли + лимон или изотоник) сразу после — интервалы выбивают их сильнее любой другой тренировки.${timeSuffix.water}`;
  } else if(trainType==='tempo'){
    // Темповая → похоже на интервалы, но акцент на устойчивость темпа
    recovery=`${dayWord} темповая${todayPlan?` (${todayPlan.label.toLowerCase()})`:''} — держать заданный темп физически и ментально тяжело, восстановление важно так же, как после интервалов. Растяжка и тёплый душ вечером, сон не менее 8 часов.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`После — белок с углеводами в течение 40 минут (курица/творог + рис или гречка). Пей смузи с бананом сразу после финиша, если аппетита ещё нет.${timeSuffix.nutrition||''}`;
    water=`3.0–3.3 л. Электролиты после тренировки — темп держит организм в стрессе дольше, чем короткие отрезки.${timeSuffix.water}`;
  } else if(trainType==='strength'){
    // Силовая → акцент на белок, отдых между подходами
    recovery=`${dayWord} силовая${todayPlan?` (${todayPlan.label.toLowerCase()})`:''} — мышцам нужно время между подходами и время на восстановление после. Не сокращай паузы между сериями. Растяжка целевых групп мышц после тренировки обязательна, лёгкий массаж или роллер — по возможности.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`Белок — ключевой приоритет сегодня: яйца, творог, курица, рыба в каждый приём пищи. После тренировки — 25–30 г белка в течение часа (творог, протеин, куриная грудка) для восстановления мышечных волокон.${timeSuffix.nutrition||''}`;
    water=`2.5–2.8 л. Силовая не требует такого объёма, как бег, но вода нужна для восстановления мышц между подходами.${timeSuffix.water}`;
  } else if(trainType==='long'){
    // Длительный → акцент на углеводы до и во время, вода с солью
    recovery=`${dayWord} длительный забег${todayPlan?` (${todayPlan.label.toLowerCase()})`:''} — самая ресурсоёмкая тренировка недели. Вечером — ноги в приподнятом положении 15 минут, растяжка, тёплая ванна или бассейн. Сон в этот день приоритетнее всего остального.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`Углеводы — до и, если бег длиннее 90 минут, во время (гель или изотоник каждые 40–45 минут). После — сразу углеводы+белок (банан с йогуртом), через 1.5 часа — полноценный приём с гречкой/рисом и белком.${timeSuffix.nutrition||''}`;
    water=`3.2–3.5 л сегодня. Вода с солью или изотоник во время самого забега — на длинной дистанции обычная вода не восполняет потери электролитов.${timeSuffix.water}`;
  } else if(trainType==='easy'){
    // Кросс/восстановительный → лёгкое питание, поддержание темпа, обычная вода
    recovery=`${dayWord} кросс в лёгком темпе${todayPlan?` (${todayPlan.label.toLowerCase()})`:''} — это тренировка на восстановление, а не на нагрузку: держи пульс низким, не форсируй. 10 минут растяжки после достаточно, специальных процедур не требуется.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`Лёгкое питание в течение дня — овощи, белок, сложные углеводы без переедания. После тренировки перекус не обязателен, если не было голода — организм не тратил много ресурса.${timeSuffix.nutrition||''}`;
    water=`2.5–2.8 л — обычный режим, без особой поправки на эту нагрузку.${timeSuffix.water}`;
  } else if(trainType==='race'){
    recovery=`${dayWord} соревновательный старт${todayPlan?` (${todayPlan.label.toLowerCase()})`:''} — режим особый: полноценный сон накануне, минимум новых процедур в этот день, только то, что уже проверено.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`Углеводная загрузка накануне и лёгкий завтрак в день старта — то, что организм уже знает и хорошо переносит. Никаких экспериментов с новой едой.${timeSuffix.nutrition||''}`;
    water=`3.0–3.5 л с акцентом на электролиты до и после старта.${timeSuffix.water}`;
  } else if(todayPlan){
    // Тренировка на сегодня есть, но тип не попал в конкретные категории
    // (не распознан по ключевым словам в тексте плана) — раньше такой день
    // молча считался «Отдыхом», хотя нагрузка реально запланирована.
    recovery=`${dayWord} у тебя ${todayPlan.label.toLowerCase()} — дай телу восстановиться: растяжка после тренировки, сон не менее 7.5–8 часов.${procsNote}${timeSuffix.recovery}${raceSoonNote}`;
    nutrition=`Сбалансированный приём пищи за 2–3 часа до тренировки (углеводы+белок), лёгкий перекус после в течение часа.${timeSuffix.nutrition||''}`;
    water=`2.8–3.0 л сегодня с учётом тренировки.${timeSuffix.water}`;
  } else {
    // rest — плана на сегодня действительно нет: сон, растяжка, лёгкое питание
    recovery=`${dayWord} день отдыха — идеально для бассейна или сауны (30–40 минут, лёгкая нагрузка на сердечно-сосудистую систему без удара по мышцам). Йога — 20–30 минут мягкой практики, разгружает то, что зажато после нагрузок недели. Массаж — раз в 1–2 недели, лучше всего именно в день отдыха, когда мышцы не в остром напряжении.${recoveryProcs?` Твои процедуры (${recoveryProcs.slice(0,60)}${recoveryProcs.length>60?'…':''}) — сегодня лучший день для них.`:''}${tomorrowHint}${raceSoonNote}`;
    nutrition=`Лёгкое питание без строгих ограничений: овощи, белок (яйца, творог, курица), сложные углеводы (гречка, овсянка). Хороший день для разнообразного меню — организм не тратит ресурс на переваривание перед или после нагрузки.`;
    water='2.2–2.5 л — стандартная норма без поправки на нагрузку.';
  }

  astro=`Луна в ${moonSign} — ${moonWater?'водный знак, благоприятствует водным процедурам и глубокому восстановлению' : 'хороший фон для дисциплины и структуры'}. Юпитер в Льве усиливает эффект любых вложений в тело сейчас.`;
  // Пункт 3: физический ресурс остаётся предупреждением в основном тексте восстановления,
  // а витамины — теперь отдельный пункт (vitaminsNote), рендерится отдельной строкой в UI.
  recovery=recovery+getLowResourceWarning();
  const vitaminsNote=getVitaminsNote();

  return {recovery,nutrition,water,astro,vitaminsNote,todayPlan,tomorrowPlan,nearestRace,isRealToday,effectiveTimeOfDay};
}

/* ======= STATE FORECAST (Прогноз состояния — новый блок в разделе «Тело») ======= */
// Пункт 2: собираем все нужные данные из уже существующих источников
// (план тренировок, витамины, физический ресурс) в одном месте.
function getBodyForecastInputs(){
  const rawPlan=localStorage.getItem('trainingPlan')||localStorage.getItem('fenix_training_plan')||'';
  const parsedDays=rawPlan?parsePlan(rawPlan):[];
  const jsDow=new Date().getDay();
  const todayIdx=jsDow===0?6:jsDow-1;
  const todayPlan=parsedDays.find(d=>d.dayIdx===todayIdx)||null;
  const vitaminsList=getVitaminsList();
  const vitaminsText=vitaminsList.map(v=>v.name).join(', ');
  const vitaminsEffect=vitaminsList.filter(v=>v.effect).map(v=>`${v.name}: ${v.effect}`).join('; ');
  const {total:baseTotal}=calcBodyResource();
  const manualAdj=Number(localStorage.getItem('body_resource_adjustment')||0);
  const resourceTotal=Math.max(0,Math.min(100,baseTotal+manualAdj));
  return{hasPlan:!!rawPlan,todayPlan,vitaminsText,vitaminsEffect,resourceTotal};
}
// Пункт 5: сигнатура входных данных — прогноз пересчитывается не только раз
// в день, но и сразу же, если изменился план, витамины или корректировка ресурса.
function getForecastSignature(inputs){
  const today=new Date().toISOString().slice(0,10);
  const planSig=inputs.todayPlan?`${inputs.todayPlan.type}|${inputs.todayPlan.intensity}|${inputs.todayPlan.timeOfDay||''}`:'none';
  return`${today}||${planSig}||${inputs.vitaminsText}||${inputs.vitaminsEffect}||${inputs.resourceTotal}`;
}
// Пункт 3: если данных нет вовсе — общая рекомендация без обращения к Claude.
// Если данные частично есть, но офлайн/нет ключа — локальный содержательный фолбэк.
function getBodyForecastFallback(inputs){
  if(!inputs.hasPlan&&!inputs.vitaminsText.trim()){
    return'Загрузи план тренировок и укажи витамины для персонализированного прогноза. Пока могу сказать: слушай тело и не форсируй нагрузку, если чувствуешь усталость.';
  }
  const parts=[];
  if(inputs.todayPlan){
    const timeWord=inputs.todayPlan.timeOfDay==='morning'?' утром':inputs.todayPlan.timeOfDay==='evening'?' вечером':'';
    parts.push(`Сегодня по плану — ${inputs.todayPlan.label.toLowerCase()}${timeWord}.`);
  }
  parts.push(`Физический ресурс сейчас — ${inputs.resourceTotal}%.`);
  if(inputs.vitaminsText.trim())parts.push(`Учитывай текущий приём: ${inputs.vitaminsText.slice(0,60)}${inputs.vitaminsText.length>60?'…':''}.`);
  parts.push('Слушай сигналы тела и корректируй нагрузку по самочувствию, а не только по плану.');
  return parts.join(' ');
}
// Пункт 3: генерация прогноза через Claude, когда есть за что зацепиться (план или витамины)
async function generateBodyForecast(inputs){
  const planText=inputs.todayPlan
    ?`Сегодня по плану: ${inputs.todayPlan.label} (${inputs.todayPlan.intLabel.toLowerCase()} интенсивность)${inputs.todayPlan.timeOfDay?`, время тренировки: ${inputs.todayPlan.timeOfDay==='morning'?'утро':'вечер'}`:''}. Детали из плана: ${inputs.todayPlan.desc.slice(0,200)}`
    :'План тренировок на сегодня не загружен или день без тренировки.';
  const vitText=inputs.vitaminsText.trim()
    ?`Сейчас принимает: ${inputs.vitaminsText}.${inputs.vitaminsEffect?` Как это влияет на восстановление: ${inputs.vitaminsEffect}.`:''}`
    :'Витамины и добавки не указаны.';
  const prompt=`НАТАЛЬНАЯ КАРТА:\n${natalSummary()}\n\n${planText}\n${vitText}\nФизический ресурс сейчас (с учётом ручной корректировки): ${inputs.resourceTotal}%.\n\nСоставь короткий ёмкий прогноз состояния тела на сегодня — 3–5 предложений, простым тёплым языком, без астрологических и медицинских терминов. Структура: 1) описание текущего состояния и возможных сигналов тела; 2) 2–3 конкретных действия на сегодня; 3) короткое напутствие в конце.\nВерни ТОЛЬКО JSON: {"forecast":"весь текст одним полем, 3-5 предложений"}`;
  const res=await callClaudeJSON(SYS_JSON,prompt);
  return res.forecast||'';
}

const BF_CACHE_KEY='body_forecast_cache';
const BF_SIG_KEY='body_forecast_sig';

function StateForecastCard(){
  const inputs=getBodyForecastInputs();
  const sig=getForecastSignature(inputs);
  const hasData=inputs.hasPlan||inputs.vitaminsText.trim().length>0;

  const [forecast,setForecast]=useState(()=>{
    if(localStorage.getItem(BF_SIG_KEY)===sig){
      const c=localStorage.getItem(BF_CACHE_KEY);
      if(c)return c;
    }
    return hasData?null:getBodyForecastFallback(inputs);
  });
  const [loading,setLoading]=useState(false);

  // Пункт 5: пересчитываем при каждом монтировании вкладки «Тело» и всегда,
  // когда меняется сигнатура (план/витамины/корректировка ресурса/дата).
  useEffect(()=>{
    if(localStorage.getItem(BF_SIG_KEY)===sig&&localStorage.getItem(BF_CACHE_KEY))return;
    if(!hasData){
      const fb=getBodyForecastFallback(inputs);
      setForecast(fb);
      localStorage.setItem(BF_CACHE_KEY,fb);
      localStorage.setItem(BF_SIG_KEY,sig);
      return;
    }
    let cancelled=false;
    setLoading(true);
    generateBodyForecast(inputs)
      .then(text=>{
        if(cancelled||!text)return;
        setForecast(text);
        localStorage.setItem(BF_CACHE_KEY,text);
        localStorage.setItem(BF_SIG_KEY,sig);
      })
      .catch(()=>{
        if(cancelled)return;
        setForecast(getBodyForecastFallback(inputs)); // нет ключа/сети — локальный фолбэк
      })
      .finally(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[sig]);

  return <div className="card" style={{borderLeft:`3px solid ${C.indigo}`}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
      <span style={{fontSize:18}}>🔮</span>
      <div className="card-title" style={{marginBottom:0}}>Прогноз состояния</div>
      {loading&&<span style={{marginLeft:'auto',fontSize:10,color:C.sub}}>обновляю…</span>}
    </div>
    <p className="body12">{forecast||'Загружаю прогноз…'}</p>
  </div>;
}

/* ======= INTERMEDIATE RACES (промежуточные старты) ======= */
const RACES_KEY='intermediateRaces';
function getRaces(){
  try{return JSON.parse(localStorage.getItem(RACES_KEY)||'[]');}catch{return[];}
}
function saveRaces(list){localStorage.setItem(RACES_KEY,JSON.stringify(list));}

// Ближайший будущий старт — используется в советах дня и рекомендациях.
// Изменение (п.5): старты с done=true (отмечены «состоялся») игнорируются.
function getNearestRace(){
  const races=getRaces();
  const today=new Date();today.setHours(0,0,0,0);
  const future=races
    .filter(r=>!r.done)
    .map(r=>({...r,dateObj:new Date(r.date+'T00:00:00')}))
    .filter(r=>r.dateObj>=today)
    .sort((a,b)=>a.dateObj-b.dateObj);
  if(future.length===0)return null;
  const r=future[0];
  const daysLeft=Math.round((r.dateObj-today)/86400000);
  return{...r,daysLeft};
}

function IntermediateRacesCard(){
  const [races,setRaces]=useState(getRaces());
  const [adding,setAdding]=useState(false);
  // editingId===null -> форма добавления; иначе -> редактирование существующего старта
  const [editingId,setEditingId]=useState(null);
  const emptyForm={date:'',distance:'',targetTime:'',type:'training'};
  const [form,setForm]=useState(emptyForm);

  const openAdd=()=>{setEditingId(null);setForm(emptyForm);setAdding(true);};
  const openEdit=(r)=>{
    setEditingId(r.id);
    setForm({date:r.date,distance:r.distance,targetTime:r.targetTime,type:r.type});
    setAdding(true);
  };
  const save=()=>{
    if(!form.date||!form.distance)return;
    let next;
    if(editingId){
      next=races.map(r=>r.id===editingId?{...r,...form}:r);
    }else{
      next=[...races,{id:Date.now(),done:false,...form}];
    }
    next=next.sort((a,b)=>a.date.localeCompare(b.date));
    setRaces(next);saveRaces(next);
    setForm(emptyForm);setAdding(false);setEditingId(null);
  };
  const cancelForm=()=>{setForm(emptyForm);setAdding(false);setEditingId(null);};
  const del=(id,e)=>{
    e.stopPropagation();
    if(!window.confirm('Удалить старт?'))return;
    const next=races.filter(r=>r.id!==id);
    setRaces(next);saveRaces(next);
  };
  const toggleDone=(id,e)=>{
    e.stopPropagation();
    const next=races.map(r=>r.id===id?{...r,done:!r.done}:r);
    setRaces(next);saveRaces(next);
  };
  const fmtDate=iso=>{
    try{
      const d=new Date(iso+'T00:00:00');
      return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    }catch{return iso;}
  };

  return <div className="card">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text}}>🏁 Промежуточные старты</div>
      {!adding&&<button onClick={openAdd}
        style={{fontSize:12,color:C.indigo,background:'none',border:'none',cursor:'pointer'}}>+ Добавить</button>}
    </div>

    {adding&&<div style={{background:C.indigoLight,borderRadius:12,padding:14,marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:C.indigo,marginBottom:8}}>
        {editingId?'Редактирование старта':'Новый старт'}
      </div>
      <input type="date" className="race-form-input" value={form.date}
        onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
      <input className="race-form-input" placeholder="Дистанция (напр. 10 км)"
        value={form.distance} onChange={e=>setForm(p=>({...p,distance:e.target.value}))}/>
      <input className="race-form-input" placeholder="Целевое время (напр. 45:00)"
        value={form.targetTime} onChange={e=>setForm(p=>({...p,targetTime:e.target.value}))}/>
      <div className="race-type-row">
        <button className={`race-type-btn ${form.type==='training'?'on':''}`}
          onClick={()=>setForm(p=>({...p,type:'training'}))}>Тренировочный</button>
        <button className={`race-type-btn ${form.type==='competition'?'on':''}`}
          onClick={()=>setForm(p=>({...p,type:'competition'}))}>Соревновательный</button>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={save} style={{flex:1,padding:10,borderRadius:10,border:'none',

    {races.length===0&&!adding&&

      </p>}

      <button className="race-check" onClick={e=>toggleDone(r.id,e)} title="Отметить состоявшимся">
        {r.done?'↩️':'✅'}
      </button>
      <button className="race-del" onClick={e=>del(r.id,e)}>🗑</button>
    </div>)}
  </div>;
}

const MARATHON_DATE = new Date(2026,8,6);
const DAYS_TO_MARATHON = Math.max(0,Math.floor((MARATHON_DATE-new Date())/86400000));
function getMarathonPhase(){
  const d=DAYS_TO_MARATHON;
  if(d>60)return{phase:'Базовая подготовка',tip:'Длительные забеги, развитие аэробной базы.',color:C.indigo};
  if(d>30)return{phase:'Специальный период',tip:'Темповые и интервальные тренировки, пик километража.',color:'#F57F17'};
  if(d>14)return{phase:'Пик + тейпер',tip:'Последний длительный, затем снижение нагрузки.',color:C.green};
  if(d>0) return{phase:'Финальный тейпер',tip:'Лёгкие 6–10 км, отдых, углеводная загрузка.',color:C.green};
  return{phase:'Марафон 🎉',tip:'День гонки!',color:C.gold};
}

// Пункт 4: динамический риск — окно считается от сегодняшней даты, а не
// зашито статичными числами. Ротация паттернов по дню месяца — сохраняет
// ощущение «настоящих» транзитов без внешнего API.
function getDynamicRisk(){
  const now=new Date();
  const patterns=[
    {label:'Марс квадрат Сатурн',days:[2,4],text:'риск перенапряжения — умерь интенсивность, приоритет на восстановление.'},
    {label:'Луна в оппозиции натальной Луне',days:[5,6],text:'эмоциональная уязвимость — не начинай сложных разговоров и не бери новых обязательств.'},
    {label:'Меркурий в тени',days:[1,3],text:'риск недопонимания в переписке — перепроверяй детали перед отправкой.'},
  ];
  const p=patterns[now.getDate()%patterns.length];
  const start=new Date(now);start.setDate(now.getDate()+p.days[0]);
  const end=new Date(now);end.setDate(now.getDate()+p.days[1]);
  const fmt=d=>`${d.getDate()} ${d.toLocaleDateString('ru-RU',{month:'long'})}`;
  return `${fmt(start)}–${fmt(end)}: ${p.label} — ${p.text}`;
}

function VitaminsCard({onSaved}){

  const [adding,setAdding]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [form,setForm]=useState({name:'',startDate:'',effect:''});

  const persist=(next)=>{
    setList(next);saveVitaminsList(next);
    onSaved&&onSaved(); // сообщаем Body — Прогноз состояния/Совет дня пересчитаются сразу
  };
  const openAdd=()=>{setForm({name:'',startDate:'',effect:''});setEditingId(null);setAdding(true);};
  const openEdit=(v)=>{setForm({name:v.name,startDate:v.startDate,effect:v.effect});setEditingId(v.id);setAdding(true);};
  const submitForm=()=>{
    if(!form.name.trim())return;
    if(editingId){
      persist(list.map(v=>v.id===editingId?{...v,name:form.name.trim(),startDate:form.startDate,effect:form.effect.trim()}:v));
    } else {
      persist([...list,{id:Date.now(),name:form.name.trim(),startDate:form.startDate,effect:form.effect.trim()}]);

            <div style={{fontSize:11,color:C.sub,marginTop:2}}>

    const v=Number(localStorage.getItem('body_resource_adjustment')||0);
    return isNaN(v)?0:v;
  });
  const adjustResource=delta=>{
    const next=Math.max(-20,Math.min(20,manualAdj+delta));

    localStorage.setItem('body_resource_adjustment',String(next));
  };
  const total=Math.max(0,Math.min(100,baseTotal+manualAdj));

// Пункт 7: ближайшие выходные (суббота-воскресенье), считаются от реальной даты
function getNextWeekendLabel(){
  const now=new Date();
  const dow=now.getDay(); // 0=вс..6=сб
  const daysToSat=(6-dow+7)%7; // если сегодня суббота — 0 (эти же выходные)
  const sat=new Date(now);sat.setDate(now.getDate()+daysToSat);
  const sun=new Date(sat);sun.setDate(sat.getDate()+1);
  const fmt=d=>d.getDate();
  const sameMonth=sat.getMonth()===sun.getMonth();
  const monthName=sun.toLocaleDateString('ru-RU',{month:'long'});
  return sameMonth
    ?`${fmt(sat)}–${fmt(sun)} ${monthName}`
    :`${fmt(sat)} ${sat.toLocaleDateString('ru-RU',{month:'long'})} – ${fmt(sun)} ${monthName}`;
}

// Упрощённая логика: приблизительный знак Луны (по фазе лунного цикла) → зона Багуа
const ZODIAC_TO_BAGUA=['career','wealth','knowledge','family','fame','health','love','helpers','creativity','career','knowledge','health'];
function getActiveBaguaZone(){
  const knownNewMoon=new Date(Date.UTC(2000,0,6,18,14,0));
  const synodic=29.530588853;
  const now=new Date();
  const days=(now-knownNewMoon)/86400000;
  const phase=((days%synodic)+synodic)%synodic;
  const signIdx=Math.floor((phase/synodic)*12)%12;
  const zoneKey=ZODIAC_TO_BAGUA[signIdx];
  return BAGUA_ZONES.find(z=>z.key===zoneKey);
}

// по темам (металлургия/индустрия, спорт и бизнес).
function getLibraryRecommendations(){
  const rated=getBooks().filter(b=>b.rating>0);
  if(rated.length===0){
    return{mode:'default',items:[
      {title:'Цель',author:'Элияху Голдратт',reason:'Классика по теме металлургии и производства — близко к Recovery Scrap.'},
      {title:'Атомные привычки',author:'Джеймс Клир',reason:'Про спорт и бизнес-дисциплину — перекликается с Recovery Hub.'},
    ]};
  }
  const top=rated.slice().sort((a,b)=>b.rating-a.rating)[0];
  const avg=rated.reduce((s,b)=>s+b.rating,0)/rated.length;
  return{mode:'personal',avg,items:[
    {title:`В духе «${top.title}»`,author:top.author||'',
      reason:`Твоя лучшая оценка (${top.rating}⭐) — ищи книги того же автора или похожей темы.`},
  ]};
}

const PROJECT_BOOK_DEFAULTS={
  scrap:[
    {title:'Цель',author:'Элияху Голдратт',reason:'Классика теории ограничений — как находить и снимать узкие места в производстве.'},
    {title:'Бережливое производство',author:'Джеймс Вумек, Дэниел Джонс',reason:'Практическое руководство по устранению потерь в производственных процессах.'},
  ],
  hub:[
    {title:'Атомные привычки',author:'Джеймс Клир',reason:'Как выстраивать устойчивые практики — применимо и к команде, и к продукту.'},
    {title:'Спроси маму',author:'Роб Фитцпатрик',reason:'Практическое пособие: как проверять гипотезы с реальными пользователями до вложений.'},
  ],
  base:[],
};
function getProjectBookRecs(project){
  const books=getBooks().filter(b=>b.project===project&&b.rating>0);
  if(books.length===0){
    const defs=PROJECT_BOOK_DEFAULTS[project]||[];
    return{source:'default',items:defs};
  }
  const avg=books.reduce((s,b)=>s+b.rating,0)/books.length;
  const top=books.slice().sort((a,b)=>b.rating-a.rating)[0];
  if(avg>=4){
    return{source:'similar',items:[
      {title:`В духе «${top.title}»`,author:top.author||'',
        reason:`Судя по твоей оценке (${top.rating}⭐) — поищи следующую книгу того же автора или жанра.`},
    ]};
  }
  return{source:'low',items:[],avg};
}
function ProjectBooks({project,onOpenLibrary}){
  const {source,items,avg}=getProjectBookRecs(project);
  const ACCENT={scrap:C.indigo,hub:'#FFB300',base:C.green}[project];

/* ======= ASTRO DIGEST (Астрологический дайджест) ======= */
// Приближённый расчёт фазы Луны без внешнего API — по известному новолунию-
// опоре и длине синодического месяца. Точность в пределах суток достаточна
// для смыслового вывода (действовать/анализировать/отдыхать), не для эфемерид.
function getMoonPhase(date){
  const knownNewMoon=new Date(Date.UTC(2000,0,6,18,14,0));
  const synodic=29.530588853;
  const days=(date-knownNewMoon)/86400000;
  const phase=((days%synodic)+synodic)%synodic;
  const pct=phase/synodic;
  if(pct<0.03||pct>0.97)return{name:'Новолуние',verdict:'Хороший день закладывать новое, а не подводить итоги — сейчас лучше сеять, чем собирать урожай.'};
  if(pct<0.22)return{name:'Растущая Луна',verdict:'Энергия на старте — действуй, не жди идеальных условий, они появятся по ходу дела.'};
  if(pct<0.28)return{name:'Первая четверть',verdict:'День решений — выбирай направление и двигайся, промедление сейчас дороже ошибки.'};
  if(pct<0.47)return{name:'Растущая Луна',verdict:'Наращивай темп, но не форсируй финал — до пика ещё есть время довести детали.'};
  if(pct<0.53)return{name:'Полнолуние',verdict:'Эмоции обострены — хороший момент для честных разговоров, но не для новых обязательств.'};
  if(pct<0.72)return{name:'Убывающая Луна',verdict:'Время анализировать и завершать, а не начинать что-то с нуля.'};
  if(pct<0.78)return{name:'Последняя четверть',verdict:'Отпускай то, что не сработало — расчисти пространство под следующий цикл.'};
  return{name:'Убывающая Луна',verdict:'Замедлись и восстанавливайся — новый цикл начнётся уже скоро, силы понадобятся.'};
}

function getBgActions(){

  const friday=new Date(now);friday.setDate(now.getDate()+daysToFriday);
  const nextMonday=new Date(friday);nextMonday.setDate(friday.getDate()+3);
  const fmt=d=>`${d.getDate()} ${d.toLocaleDateString('ru-RU',{month:'long'})}`;
  return[
    `до ${fmt(friday)} — закрой зависшие вопросы в переписке, не откладывай на следующую неделю.`,
    `${fmt(nextMonday)} — хороший день начать новый разговор или предложение, фон будет более располагающим.`,
  ];
}

      {[['journal','📝','Журнал','Заметки + транзиты'],['library','📚','Библиотека','Книги и оценки'],['powerplace','🧭','Место силы','Куда за энергией'],['mycode','✨','Мой код','Натальная карта'],['digest','🌙','Астро-дайджест','Сегодня, фон, картина'],['insights','🔮','Глубинные запросы','Особые разборы']].map(([id,e,l,s])=><button key={id} className="more-tile" onClick={()=>onNav(id)}>
        <span className="ei2">{e}</span><strong>{l}</strong><span>{s}</span>
      </button>)}
    </div>
    <div className="card" style={{cursor:'pointer'}} onClick={()=>onNav('notifications')}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>🔔 Уведомления</div>
          <div style={{fontSize:11,color:C.sub,marginTop:2}}>Ежедневно, события, транзиты</div>
        </div>
        <span style={{color:C.sub}}>›</span>
      </div>
    </div>
    <button className="reset-btn" onClick={reset}>Сбросить ключ ИИ-ассистента</button>
    <div className="card"><p style={{fontSize:11,color:C.sub}}>Феникс 2.0 · только для Никиты</p><p style={{fontSize:12,color:C.text,marginTop:3}}>localStorage · данные офлайн</p></div>
  </div></div>;
}

/* ======= FAB STOP ======= */
function StopFAB({active,endTime,onActivate}){
  const [timer,setTimer]=useState('');
  useEffect(()=>{
    if(!active||!endTime)return;
    const tick=()=>{
      const left=Math.max(0,Math.floor((endTime-Date.now())/1000));
      if(left===0){setTimer('');return;}
      const h=Math.floor(left/3600),m=Math.floor((left%3600)/60);
      setTimer(h>0?`${h}ч${m}м`:`${m}м`);
    };
    tick();const iv=setInterval(tick,30000);
    return()=>clearInterval(iv);
  },[active,endTime]);
  const press=()=>{
    if(active){alert('Режим Стоп-кран активен ещё '+timer+'. Можешь продолжить работу после окончания таймера.');return;}
    if(window.confirm('Остановить все активные инициативы на 2 часа?\n\nВо время Стоп-крана: не отправляй важные письма, не принимай ключевых решений, не подписывай документы.')){
      onActivate(Date.now()+2*60*60*1000);
    }
  };
  return <button className={`fab ${active?'on':'off'}`} onClick={press}>
    <span className="fab-icon">{active?'⏱':'🛑'}</span>
    {active&&timer&&<span className="fab-timer">{timer}</span>}
    {!active&&<span className="fab-timer">стоп</span>}
  </button>;
}

/* ======= NAV ======= */
const NAV_TABS=[{id:'home',e:'🏠',l:'Главная'},{id:'calendar',e:'📅',l:'Календарь'},{id:'projects',e:'📁',l:'Проекты'},{id:'body',e:'💪',l:'Тело'},{id:'oracle',e:'👁',l:'Оракул'},{id:'more',e:'⋯',l:'Ещё'}];
// Пункт 7: в «Ещё» остались только Журнал/Мой код/Уведомления/Инсайты.
// projects и powerplace — экраны-детали, открываются только карточками с Главной.
const SUB=['journal','mycode','notifications','insights','powerplace','library','digest'];
function Nav({active,onNav}){
  return <nav className="nav">{NAV_TABS.map(t=>{
    const on=active===t.id||(t.id==='more'&&SUB.includes(active));
    return<button key={t.id} className={`nav-item ${on?'on':'off'}`} onClick={()=>onNav(t.id)}>
      <span className="ei">{t.e}</span><span className="el">{t.l}</span>
    </button>;
  })}</nav>;
}

/* ======= ROOT ======= */
function App(){
  const [phase,setPhase]=useState('splash');
  const [screen,setScreen]=useState('home');
  const [energy,setEnergy]=useState(ENERGY_DEF);
  const [splashDone,setSplashDone]=useState(false);
  const [phrase]=useState(randomPhrase);
  // Изменение (п.4): calKey увеличивается при каждом клике на вкладку
  // «Календарь» в нижней навигации — это форсирует remount компонента
  // Calendar, чтобы он заново инициализировался от текущей даты, даже
  // если пользователь уже находится на этом экране.
  const [calKey,setCalKey]=useState(0);
  const handleNav=(s)=>{
    if(s==='calendar')setCalKey(k=>k+1);
    setScreen(s);
  };
  // Библиотека: фильтр по проекту при переходе из блока «Книги по теме»
  const [libraryFilter,setLibraryFilter]=useState('all');
  const openLibrary=project=>{setLibraryFilter(project);setScreen('library');};
  // Журнал: тег, с которым открываем экран (используется кнопкой «Записать сон →»)
  const [journalTag,setJournalTag]=useState(null);
  const goJournalWithTag=tag=>{setJournalTag(tag);setScreen('journal');};

  const afterSplash=()=>{
    setSplashDone(true);
    const key=localStorage.getItem('fenix_api_key');
    setPhase(key?'app':'gate');
    if(key)loadEnergy();
  };

  const loadEnergy=async()=>{
    const cached=localStorage.getItem('fenix_daily_cache');
    const cachedDate=localStorage.getItem('fenix_daily_date');
    const today=new Date().toISOString().slice(0,10);
    if(cachedDate===today&&cached){try{setEnergy(JSON.parse(cached));}catch{}return;}
    try{
      const transits='Юпитер в начале Льва (соедин. с натальным Солнцем), Луна в Скорпионе.';
      const r=await callClaudeJSON(SYS_JSON,`НАТАЛЬНАЯ КАРТА:\n${natalSummary()}\nДАТА: ${today}\nТРАНЗИТЫ: ${transits}\n\nЗАПОЛНИ ДВА РАЗНЫХ ПО СМЫСЛУ ТЕКСТА:\n1. "advice" — короткий комментарий (1 предложение) к шкалам энергии (воля/интуиция/действие), человеческим языком, без астрологических терминов.\n2. "mood" — отдельная короткая рекомендация (2–3 предложения) про повседневную жизнь, настроение, общение, отдых, внутреннее состояние. НЕ про спорт, тренировки, питание, работу или проекты. Без астрологических терминов, простым тёплым языком.\n\nВерни ТОЛЬКО JSON: {"mode":"...","will":0-100,"intuition":0-100,"action":0-100,"aspect":"...","advice":"...","mood":"..."}`);
      const merged={...ENERGY_DEF,...r};
      setEnergy(merged);
      localStorage.setItem('fenix_daily_cache',JSON.stringify(merged));
      localStorage.setItem('fenix_daily_date',today);
    }catch{}
  };

  const render=()=>{
    switch(screen){
      case'home':return<Home onNav={setScreen} energy={energy} onGoJournal={goJournalWithTag}/>;
      case'calendar':return<Calendar key={calKey}/>;
      case'projects':return<Projects onOpenLibrary={openLibrary}/>;
      case'body':return<Body/>;
      case'oracle':return<Oracle/>;
      case'more':return<More onNav={setScreen} onKeyCleared={()=>setPhase('gate')}/>;
      case'powerplace':return<PowerPlace onBack={()=>setScreen('more')}/>;
      case'journal':return<Journal onBack={()=>setScreen('more')} initialTag={journalTag}/>;
      case'library':return<Library onBack={()=>setScreen('more')} initialFilter={libraryFilter}/>;
      case'mycode':return<MyCode onBack={()=>setScreen('more')}/>;
      case'notifications':return<Notifications onBack={()=>setScreen('more')}/>;
      case'insights':return<InsightsScreen onBack={()=>setScreen('more')}/>;
      case'digest':return<AstroDigest onBack={()=>setScreen('more')}/>;
      default:return<Home onNav={setScreen} energy={energy} onGoJournal={goJournalWithTag}/>;
    }
  };

  if(phase==='splash'||!splashDone)return<>
    {!splashDone&&<Splash phrase={phrase} onDone={afterSplash}/>}
  </>;
  if(phase==='gate')return<Gate onSaved={()=>{setPhase('app');loadEnergy();}}/>;
  return<>
    {render()}
    <Nav active={screen} onNav={handleNav}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
