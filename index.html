<style>
/* ============================================================
   ВИЗУАЛЬНЫЙ РЕДИЗАЙН — комментарии по пунктам ТЗ отмечены (п.N).
   Логика, тексты и структура компонентов НЕ менялись — только CSS
   и несколько точечных презентационных правок (см. итоговое резюме).
   ============================================================ */
:root {
  --bg:#F5F7FA;--indigo:#1A237E;--indigo-mid:#3949AB;--indigo-light:#E8EAF6;
  /* Пункт 8: приглушённая палитра — золото мягче, заголовки/текст в серо-синих тонах */
  --gold:#FFD54F;--heading:#37474F;--text:#424242;--sub:#78909C;
  /* (п.5) насыщенные цвета статусов дня: зелёный/оранжевый/красный ярче и контрастнее */
  --red:#C62828;--green:#2E7D32;--green-light:#E8F5E9;--amber:#F57F17;
  --white:#FFFFFF;
  /* (п.3) разделители тоньше и мягче — индиго-тон вместо серого */
  --border:#E8EAF6;--border-soft:#EDEFF7;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  /* (п.2) переиспользуемые градиенты для кнопок и карточек */
  --grad-btn:linear-gradient(135deg,#1A237E 0%,#3949AB 100%);
  --grad-card:linear-gradient(180deg,#FFFFFF 0%,#F5F7FA 100%);
  /* Пункт 8: нейтральная (не индиго-тонированная) мягкая тень карточек */
  --shadow-card:0 8px 24px rgba(0,0,0,.06);
  --shadow-btn:0 4px 14px rgba(26,35,126,.28);
  --glow-gold:0 0 0 1px rgba(255,213,79,.3),0 4px 18px rgba(255,213,79,.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
/* ИСПРАВЛЕНО (баг №2): на iOS Safari без явных width/overflow-x на html и body
   резиновый оверскролл может сдвигать всю страницу по горизонтали при скролле —
   именно это выглядит как «контент съезжает и не центрируется». Фиксируем ширину
   и запрещаем горизонтальный скролл на самом верхнем уровне. */
html{height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%;}
body{width:100%;overflow-x:hidden;}
/* (п.1) базовая типографика: воздушный line-height наследуется всеми
   элементами, которые не задают его инлайново — это разом улучшает
   читаемость по всему приложению без переписывания каждого компонента. */
body{
  font-family:-apple-system,'SF Pro Text','Inter',sans-serif;
  background:linear-gradient(180deg,#FAFAFA 0%,#F0F2F5 100%);background-attachment:fixed;
  color:#424242;font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;
}
#root{display:flex;flex-direction:column;height:100dvh;min-height:100dvh;width:100%;overflow:hidden;overflow-x:hidden;}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px);}
.pad{padding:calc(6px + var(--safe-top)) 16px calc(100px + env(safe-area-inset-bottom,0px));animation:fadeInUp .38s cubic-bezier(.2,.8,.2,1) both;}

/* (п.6) Карточки — единый стиль: белый фон, радиус 16px, мягкая тень, отступ 16px */
.card{
  background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.03);
  animation:fadeInUp .35s ease both;
}
.card-title{font-size:14.5px;font-weight:600;color:#37474F;margin-bottom:12px;letter-spacing:-.01em;}

/* Bar — (п.4) толще, с градиентной заливкой для выразительности */
.bar-wrap{margin-bottom:15px;}
.bar-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.bar-top span{font-size:12px;color:var(--sub);}
.bar-track{height:10px;background:var(--indigo-light);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.2,.8,.2,1);}

/* Tabs — (п.3) активное нажатие масштабируется */
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab{flex:1;padding:11px 6px;border-radius:14px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;
  transition:transform .15s ease,background .2s ease,box-shadow .2s ease;}
.tab:active{transform:scale(.97);}
.tab.on{background:var(--grad-btn);color:#fff;box-shadow:var(--shadow-btn);}
.tab.off{background:var(--white);color:var(--sub);box-shadow:0 1px 4px rgba(0,0,0,.06);}

/* Segmented control */
.seg{display:flex;background:var(--indigo-light);border-radius:14px;padding:4px;margin-bottom:14px;}
.seg-btn{flex:1;padding:9px 4px;border:none;border-radius:11px;font-size:11px;font-weight:600;cursor:pointer;
  background:transparent;color:var(--sub);transition:transform .15s ease,background .2s ease;}
.seg-btn:active{transform:scale(.96);}
.seg-btn.on{background:var(--white);color:var(--indigo);box-shadow:0 2px 6px rgba(26,35,126,.12);}

/* (п.6) Нижняя навигация: 68px фиксированная, иконки 22px, активная вкладка — золотой акцент */
.nav{display:flex;border-top:1px solid var(--border);background:var(--white);min-height:68px;
  padding-bottom:max(8px,var(--safe-bottom));flex-shrink:0;box-shadow:0 -2px 12px rgba(26,35,126,.05);
  position:sticky;bottom:0;z-index:40;}
.nav-item{flex:1;padding:12px 0 8px;background:none;border:none;cursor:pointer;display:flex;
  flex-direction:column;align-items:center;gap:4px;transition:transform .25s cubic-bezier(.2,.8,.2,1);}
.nav-item:active{transform:scale(.9);}
.nav-item .ei{font-size:22px;transition:opacity .25s ease,transform .25s cubic-bezier(.2,.8,.2,1);}
.nav-item .el{font-size:9.5px;transition:color .2s ease;}
.nav-item.on{transform:translateY(-2px);}
.nav-item.on .ei{opacity:1;transform:scale(1.08);}
.nav-item.off .ei{opacity:.4;filter:grayscale(1);}
.nav-item.on .el{color:var(--gold);font-weight:700;}
.nav-item.off .el{color:var(--sub);}

/* FAB Stop — (п.4) сдвинут под новую высоту навигации */
.fab{position:fixed;right:16px;bottom:calc(88px + var(--safe-bottom));z-index:50;
  width:58px;height:58px;border-radius:29px;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(198,40,40,.4);transition:transform .15s ease;}
.fab:active{transform:scale(.92);}
.fab.off{background:linear-gradient(135deg,#D32F2F 0%,#C62828 100%);}
.fab.on{background:#8E1616;}
.fab-icon{font-size:23px;line-height:1;}
.fab-timer{font-size:9px;color:#fff;font-weight:700;margin-top:1px;line-height:1;}

/* Stop banner */
.stop-banner{background:linear-gradient(135deg,#D32F2F,#C62828);padding:13px 16px;display:flex;
  align-items:center;gap:10px;flex-shrink:0;}
.stop-banner p{font-size:12.5px;color:#fff;line-height:1.5;}

/* (п.2) Splash: глубокий насыщенный градиент вместо плоского индиго */
#splash{position:fixed;inset:0;width:100%;min-height:100dvh;
  background:linear-gradient(165deg,#0A0E27 0%,#1A237E 55%,#283593 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;padding:calc(32px + env(safe-area-inset-top,0px)) 32px calc(32px + env(safe-area-inset-bottom,0px));
  text-align:center;transition:opacity .5s ease;}
#splash .bird{font-size:54px;margin-bottom:12px;filter:drop-shadow(0 6px 20px rgba(255,179,0,.35));}
#splash .title{font-size:25px;font-weight:700;color:var(--gold);letter-spacing:5px;margin-bottom:46px;
  text-shadow:0 0 24px rgba(255,179,0,.3);}
#splash .line{color:rgba(255,255,255,.92);line-height:1.7;max-width:275px;transition:font-size .5s,font-weight .5s;}

/* Gate */
.gate{display:flex;flex-direction:column;justify-content:center;height:100%;padding:28px;}
.gate h2{font-size:22px;font-weight:700;color:var(--indigo);margin-bottom:11px;}
.gate p{font-size:13.5px;color:var(--sub);line-height:1.7;margin-bottom:22px;}
.gate input{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);
  font-size:14px;color:var(--text);background:var(--white);margin-bottom:14px;transition:border-color .2s;}
.gate input:focus{border-color:var(--indigo);outline:none;}
.gate .btn-main{width:100%;padding:15px;border-radius:14px;border:none;font-size:14px;font-weight:700;
  color:#fff;background:var(--grad-btn);box-shadow:var(--shadow-btn);cursor:pointer;transition:transform .15s;}
.gate .btn-main:active{transform:scale(.97);}
.gate .hint{font-size:11px;color:var(--sub);margin-top:16px;text-align:center;}

/* Home */
.home-head{padding-top:2px;margin-bottom:20px;}
.home-head .date{font-size:11.5px;color:var(--sub);margin-bottom:3px;}
.home-head .greeting{font-size:21px;font-weight:700;color:var(--indigo);letter-spacing:-.01em;}
.home-head .transit{font-size:12.5px;color:var(--sub);margin-top:5px;line-height:1.5;}
.badge{background:var(--indigo-light);padding:4px 10px;border-radius:20px;font-size:10px;color:var(--indigo-mid);font-weight:600;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.advice-box{background:var(--indigo-light);border-radius:14px;padding:14px;margin-top:6px;}
.advice-box p{font-size:12.5px;color:var(--indigo-mid);line-height:1.65;}

/* Project mini-cards — (п.3) press-эффект и мягкая тень */
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
/* Пункт 2: широкие карточки проектов на Главной (на всю ширину, вертикальный список) */
.proj-card-wide{display:flex;align-items:center;gap:14px;border-radius:18px;padding:16px 18px;
  cursor:pointer;box-shadow:var(--shadow-card);transition:transform .15s ease;}
.proj-card-wide:active{transform:scale(.97);}
/* Пункт 3: блок «Связи с другими проектами» — визуально отделён пунктиром и другим фоном */
.links-box{background:var(--indigo-light);border:1.5px dashed var(--indigo);border-radius:16px;
  padding:14px 16px;margin-bottom:14px;}
.links-head{font-size:12px;font-weight:700;color:var(--indigo);margin-bottom:6px;}
.links-box p{font-size:12.5px;color:var(--sub);line-height:1.55;}
.proj-card{background:var(--grad-card);border-radius:16px;padding:16px;cursor:pointer;
  box-shadow:var(--shadow-card);position:relative;overflow:hidden;
  transition:transform .15s ease,box-shadow .15s ease;}
.proj-card:active{transform:scale(.97);}
.proj-card::after{content:'→';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--indigo-light);font-size:17px;}
.proj-card .pc-tag{font-size:10px;color:var(--sub);margin-bottom:7px;font-weight:600;}
.proj-card .pc-name{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:7px;}
.proj-card .pc-phase{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.proj-card .pc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.proj-card .pc-phase-label{font-size:11px;font-weight:600;}
.proj-card .pc-dead{font-size:10px;color:var(--red);font-weight:700;}

/* (п.5) Календарь: крупнее, ярче, отзывчивее */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav button{background:var(--indigo-light);border:none;font-size:22px;color:var(--indigo);
  cursor:pointer;padding:6px 14px;border-radius:12px;transition:transform .15s ease;}
.cal-nav button:active{transform:scale(.9);}
.cal-nav span{font-size:15.5px;font-weight:700;color:var(--text);}
.wd-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;min-width:0;}
.wd-row span{text-align:center;font-size:10.5px;color:var(--sub);padding:4px 0;font-weight:600;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;min-width:0;}
.day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;
  position:relative;border:2px solid transparent;cursor:pointer;touch-action:manipulation;
  transition:transform .12s ease,border-color .2s ease;min-width:0;overflow:hidden;
  box-shadow:0 1px 3px rgba(26,35,126,.06);}
.day-cell:active{transform:scale(.9);}
.day-cell span{font-size:13.5px;font-weight:500;}
.day-cell .star{position:absolute;top:2px;right:3px;font-size:8px;}
.day-cell-bar{position:absolute;bottom:2px;left:22%;right:22%;height:3px;border-radius:2px;}
.legend{display:flex;justify-content:center;gap:16px;margin-top:16px;}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:11px;height:11px;border-radius:4px;border:1.5px solid;}
.leg-label{font-size:10.5px;color:var(--sub);font-weight:500;}
.layer-hint{font-size:11.5px;color:var(--sub);text-align:center;margin:9px 0 15px;line-height:1.5;}

/* Projects */
.phase-row{display:flex;gap:12px;margin-bottom:15px;}
.phase-dot{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;}
.phase-line{width:2px;height:23px;background:var(--border);margin:0 auto;}
.counter{background:var(--indigo-light);border-radius:18px;padding:22px;margin-bottom:14px;text-align:center;}
.counter .num{font-size:58px;font-weight:700;color:var(--indigo);display:inline-block;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) both;}
.gold-box{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border-radius:18px;padding:17px;
  margin-bottom:14px;border:1px solid var(--gold);box-shadow:var(--glow-gold);}
.out-btn{width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--indigo);background:transparent;
  color:var(--indigo);font-size:13.5px;font-weight:700;cursor:pointer;transition:transform .15s,background .2s;}
.out-btn:active{transform:scale(.97);background:var(--indigo-light);}

/* (п.6) Оракул: просторнее, с золотым свечением на кнопке */
.oracle-input{width:100%;padding:15px;border-radius:14px;border:1.5px solid var(--border);font-size:14px;
  color:var(--text);background:var(--bg);resize:none;font-family:inherit;min-height:100px;box-sizing:border-box;
  line-height:1.6;transition:border-color .2s;}
.oracle-input:focus{border-color:var(--indigo);outline:none;}
.oracle-input.one{min-height:unset;}
.ask-btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:14.5px;font-weight:700;color:#fff;
  background:var(--grad-btn);cursor:pointer;margin-top:15px;
  box-shadow:var(--shadow-btn),0 0 22px rgba(255,213,79,.25);transition:transform .15s ease;}
.ask-btn:active{transform:scale(.97);}
.ask-btn:disabled{opacity:.55;box-shadow:none;}
.verdict-box{background:var(--indigo-light);border-radius:14px;padding:14px;margin-bottom:14px;}
.verdict-box p{font-size:13.5px;font-weight:700;color:var(--indigo);}
.field{margin-bottom:10px;}
.field label{font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:3px;}
.field p{font-size:13.5px;color:var(--text);line-height:1.65;}
.elect-box{background:var(--indigo-light);border-radius:14px;padding:14px;margin-bottom:14px;text-align:center;}
.elect-box .big{font-size:19px;font-weight:700;color:var(--indigo);}
.copy-btn{width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:transparent;
  color:var(--sub);font-size:12px;cursor:pointer;margin-top:9px;transition:transform .15s;}
.copy-btn:active{transform:scale(.97);}
.copy-btn.copied{border-color:var(--green);color:var(--green);}

/* Oracle accordion history — (п.8) лёгкая анимация раскрытия */
.hist-item{border-top:1px solid var(--border);padding-top:11px;margin-top:11px;}
.hist-trigger{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;}
.hist-meta{font-size:11px;color:var(--sub);}
.hist-q{font-size:13.5px;color:var(--text);margin-top:3px;line-height:1.5;}
.hist-chevron{font-size:14px;color:var(--sub);flex-shrink:0;margin-left:8px;margin-top:2px;transition:transform .2s;}
.hist-del{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;color:var(--sub);
  flex-shrink:0;opacity:.6;transition:transform .15s,opacity .15s;}
.hist-del:active{transform:scale(.85);opacity:1;}
/* Кнопка быстрого шаблона «Послеобеденный спад» — второстепенная, не перетягивает внимание с «Спросить» */
.slump-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--gold);background:rgba(255,213,79,.12);
  color:#B25C00;font-size:11px;font-weight:600;cursor:pointer;transition:transform .15s ease;white-space:nowrap;flex-shrink:0;}
.slump-btn:active{transform:scale(.94);}
/* Пункт 3: плиточная сетка 6 шаблонов Оракула — у каждой категории свой акцент */
.tpl-tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.tpl-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:14px 6px;border-radius:16px;border:1.5px solid transparent;background:#fff;
  box-shadow:0 2px 10px rgba(26,35,126,.07);cursor:pointer;text-align:center;
  transition:transform .15s cubic-bezier(.2,.8,.2,1),box-shadow .15s ease;}
.tpl-tile:active{transform:scale(.95);box-shadow:0 1px 4px rgba(26,35,126,.1);}
.tpl-tile .tt-icon{font-size:23px;}
.tpl-tile .tt-label{font-size:10.5px;font-weight:600;color:var(--text);line-height:1.3;}
.tpl-tile.accent-gold{border-color:rgba(255,213,79,.5);background:linear-gradient(160deg,#FFFDF3,#fff);}
.tpl-tile.accent-indigo{border-color:rgba(26,35,126,.28);background:linear-gradient(160deg,#F2F3FB,#fff);}
.tpl-tile.accent-green{border-color:rgba(46,125,50,.28);background:linear-gradient(160deg,#F0F8F1,#fff);}
.tpl-tile.accent-red{border-color:rgba(198,40,40,.25);background:linear-gradient(160deg,#FDF2F2,#fff);}
.hist-body{padding-top:9px;animation:fadeInUp .28s cubic-bezier(.2,.8,.2,1) both;}
.hist-fb{display:flex;align-items:center;gap:8px;margin-top:7px;}
.hist-fb span{font-size:11px;color:var(--sub);}
.hist-fb button{font-size:12px;font-weight:700;border:none;background:none;cursor:pointer;padding:0;transition:transform .15s;}
.hist-fb button:active{transform:scale(.9);}

/* Tags */
.tag-wrap{display:flex;align-items:center;flex-wrap:wrap;gap:7px;}
.tag-hash{width:32px;height:32px;border-radius:16px;background:var(--grad-btn);border:none;color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;transition:transform .15s;}
.tag-hash:active{transform:scale(.9);}
.tag-chip{padding:6px 12px;border-radius:20px;border:none;font-size:11px;cursor:pointer;transition:transform .15s;font-weight:500;}
.tag-chip:active{transform:scale(.94);}
.tag-chip.on{background:var(--indigo);color:#fff;}
.tag-chip.off{background:var(--indigo-light);color:var(--indigo);}
.tag-drop{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;background:var(--white);border-radius:12px;
  padding:9px;box-shadow:0 4px 16px rgba(26,35,126,.12);animation:fadeInUp .2s ease both;}

/* Team */
.av{width:46px;height:46px;border-radius:23px;background:var(--indigo-light);display:flex;
  align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.team-input{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);font-size:13.5px;
  color:var(--text);background:var(--bg);margin-bottom:9px;transition:border-color .2s;}
.team-input:focus{border-color:var(--indigo);outline:none;}
.analyze-btn{width:100%;padding:13px;border-radius:14px;border:none;font-size:13.5px;font-weight:700;
  color:#fff;background:var(--grad-btn);cursor:pointer;margin-top:5px;box-shadow:var(--shadow-btn);
  transition:transform .15s;}
.analyze-btn:active{transform:scale(.97);}
.move-btn{width:100%;padding:11px;border-radius:12px;border:1.5px solid var(--green);background:transparent;
  color:var(--green);font-size:13.5px;font-weight:600;cursor:pointer;margin-top:13px;transition:transform .15s;}
.move-btn:active{transform:scale(.97);}
.verdict-badge{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0;}

/* (п.7) Тело */
.res-widget{background:var(--grad-card);border-radius:22px;padding:22px;margin-bottom:14px;
  text-align:center;box-shadow:var(--shadow-card);}
.res-num{font-size:62px;font-weight:700;line-height:1;}
.res-ring-wrap{position:relative;width:120px;margin:0 auto 13px;}
.res-factors{margin-top:15px;text-align:left;}
.factor-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.factor-row:last-child{border-bottom:none;}
.factor-label{font-size:12.5px;color:var(--sub);}
.factor-val{font-size:12.5px;font-weight:700;}
.warn-banner{background:linear-gradient(135deg,#D32F2F,#C62828);border-radius:16px;padding:15px;
  margin-bottom:14px;display:flex;gap:11px;box-shadow:0 6px 18px rgba(198,40,40,.25);}
.warn-banner p{font-size:12.5px;color:#fff;line-height:1.6;}

/* Power place */
.hero-pp{background:var(--grad-btn);border-radius:18px;padding:22px;margin-bottom:14px;box-shadow:var(--shadow-btn);}
.compass-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;width:160px;margin:0 auto 17px;}
.dir-btn{padding:11px 0;border-radius:12px;border:none;font-size:13.5px;font-weight:700;cursor:pointer;transition:transform .15s;}
.dir-btn:active{transform:scale(.93);}
.dir-btn.on{background:var(--indigo);color:#fff;}
.dir-btn.off{background:var(--indigo-light);color:var(--indigo);}
.city-row{display:flex;gap:9px;}
.city-row input{flex:1;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);font-size:13.5px;
  color:var(--text);background:var(--bg);transition:border-color .2s;}
.city-row input:focus{border-color:var(--indigo);outline:none;}
.city-go{padding:11px 18px;border-radius:12px;border:none;background:var(--grad-btn);color:#fff;
  font-size:16px;cursor:pointer;box-shadow:var(--shadow-btn);transition:transform .15s;}
.city-go:active{transform:scale(.93);}
.res-box{background:var(--indigo-light);border-radius:14px;padding:14px;margin-top:14px;}
.res-box strong{font-size:13.5px;font-weight:700;color:var(--indigo);display:block;margin-bottom:5px;}
.res-box p{font-size:13px;color:var(--sub);line-height:1.6;}

/* Journal */
.journal-textarea{width:100%;min-height:84px;padding:14px;border-radius:14px;border:1.5px solid var(--border);
  font-size:13.5px;color:var(--text);background:var(--bg);resize:none;font-family:inherit;line-height:1.6;
  transition:border-color .2s;}
.journal-textarea:focus{border-color:var(--indigo);outline:none;}
.add-btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:13.5px;font-weight:700;color:#fff;
  background:var(--grad-btn);cursor:pointer;margin-top:13px;box-shadow:var(--shadow-btn);transition:transform .15s;}
.add-btn:active{transform:scale(.97);}
.j-entry{background:var(--grad-card);border-radius:16px;padding:16px;margin-bottom:11px;
  box-shadow:0 2px 10px rgba(26,35,126,.06);animation:fadeInUp .3s ease both;}
.j-head{display:flex;justify-content:space-between;margin-bottom:7px;}
.j-text{font-size:13.5px;color:var(--text);line-height:1.65;margin-bottom:9px;}
.j-tags{display:flex;flex-wrap:wrap;gap:6px;}
.j-tag{background:var(--indigo-light);color:var(--indigo);padding:4px 9px;border-radius:20px;font-size:11px;font-weight:500;}

/* MyCode */
.pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:5px;margin-bottom:17px;}
.pills::-webkit-scrollbar{display:none;}
.pill{padding:9px 16px;border-radius:22px;border:none;font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:transform .15s,background .2s;}
.pill:active{transform:scale(.95);}
.pill.on{background:var(--grad-btn);color:#fff;box-shadow:0 3px 10px rgba(26,35,126,.22);}
.pill.off{background:var(--white);color:var(--sub);}
.planet-row{display:flex;gap:11px;padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--border);}
.planet-row .glyph{font-size:19px;width:29px;flex-shrink:0;}
.p-top{display:flex;justify-content:space-between;}
.p-name{font-size:13.5px;font-weight:600;color:var(--text);}
.p-house{font-size:11px;color:var(--indigo);font-weight:600;}
.p-pos{font-size:12.5px;color:var(--indigo-mid);font-weight:600;}
.p-note{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.5;}
.power-box{background:var(--indigo-light);border-radius:14px;padding:16px;margin-bottom:14px;}
.trap-box{border-left:3px solid var(--red);padding-left:13px;margin-bottom:15px;}

/* More */
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:17px;}
.more-tile{background:var(--grad-card);border-radius:18px;padding:22px;cursor:pointer;
  box-shadow:var(--shadow-card);border:none;text-align:left;transition:transform .15s ease;}
.more-tile:active{transform:scale(.96);}
.more-tile .ei2{font-size:33px;margin-bottom:13px;display:block;}
.more-tile strong{font-size:14.5px;font-weight:700;color:var(--text);display:block;}
.more-tile span{font-size:11.5px;color:var(--sub);}
.reset-btn{width:100%;padding:13px;background:none;border:none;color:var(--red);font-size:12.5px;
  font-weight:600;cursor:pointer;transition:transform .15s;}
.reset-btn:active{transform:scale(.96);}

/* Notifications */
.notif-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);}
.notif-row:last-child{border-bottom:none;}
.notif-info{flex:1;}
.notif-label{font-size:13.5px;font-weight:600;color:var(--text);}
.notif-desc{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.5;}
.toggle{position:relative;width:46px;height:27px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;border-radius:14px;background:var(--border);transition:background .25s;cursor:pointer;}
.toggle input:checked + .toggle-track{background:var(--grad-btn);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;
  transition:transform .25s cubic-bezier(.2,.8,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.25);}
.toggle input:checked ~ .toggle-thumb{transform:translateX(19px);}

function calcBodyResource(){
  const base=70;
  const factors=[
    {l:'Марс в Рыбах (натал)',v:-5,d:'Рассеянная энергия, действуй через поток'},
    {l:'Луна-Плутон (натал)',v:-8,d:'Интенсивность но и истощение'},
    {l:'Юпитер в Льве (транзит)',v:+15,d:'Прилив жизненных сил'},
    {l:'Сатурн в XII (натал)',v:-7,d:'Скрытая усталость'},
  ];
  // Небольшая вариация по дню недели
  const dow=new Date().getDay();
  const dayBonus=dow===0||dow===6?+5:dow===3?+3:0;
  if(dayBonus>0)factors.push({l:'День недели',v:dayBonus,d:'Пиковый день цикла'});
  const total=factors.reduce((s,f)=>s+f.v,base);
  return{total:Math.max(0,Math.min(100,total)),factors,base};
}

async function callClaude(system,prompt){
  const key=localStorage.getItem('fenix_api_key');
  if(!key)throw new Error('NO_KEY');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:MODEL,max_tokens:2000,system,messages:[{role:'user',content:prompt}]}),
  });
  if(!r.ok){const t=await r.text();throw new Error(`API ${r.status}: ${t.slice(0,200)}`);}
  const d=await r.json();
  return(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
}
async function callClaudeJSON(system,prompt){
  const raw=await callClaude(system,prompt);
  const clean=raw.replace(/```json|```/g,'').trim();
  const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
  return JSON.parse(s>=0&&e>=0?clean.slice(s,e+1):clean);
}

/* ======= CALENDAR SHARED UTILS ======= */
function matchKeyDate(kd,yr,mo,d){
  const parts=kd.d.split(' ');
  const mName=parts[parts.length-1];
  const mNum=RU_GEN[mName];
  if(mNum===undefined||mNum!==mo)return false;
  const dayPart=parts[0];
  if(dayPart.includes('–')){const[from,to]=dayPart.split('–').map(Number);return d>=from&&d<=to;}
  return Number(dayPart)===d;
}

  useEffect(()=>{

    /* ИСПРАВЛЕНО (баг №1): раньше здесь стоял inline position:'relative', который
       перебивал CSS-правило #splash{position:fixed;inset:0} (инлайн-стили в React
       всегда побеждают классы). Из-за этого заставка не растягивалась на весь
       экран, а сжималась по высоте контента внутри #root — отсюда «только верхняя
       часть экрана». Теперь position не переопределяется инлайном — работает
       fixed+inset:0 из CSS, заставка всегда во весь экран независимо от контента. */
  }}>
    {SP.map((s,i)=><div key={i} style={{
      position:'absolute',left:s.l,top:s.t,width:s.s,height:s.s,

   Изменение (п.1): прогноз теперь генерируется через Claude API один раз

const WEEK_ASTRO_POOL=[
  {quality:'g',moon:'Луна растёт — поддержка новых начинаний',aspect:'Хороший день для контактов и общения'},
  {quality:'y',moon:'Луна в напряжённом аспекте к Сатурну',aspect:'День для порядка в делах — не начинай новое'},
  {quality:'g',moon:'Луна в родной стихии — эмоциональная ясность',aspect:'День для тишины и отдыха'},
  {quality:'r',moon:'Полнолуние — пик эмоционального напряжения',aspect:'Избегай резких решений и конфликтов'},
  {quality:'y',moon:'Луна убывает — время подводить итоги',aspect:'Хороший день навести порядок в делах'},
  {quality:'g',moon:'Луна в гармонии с Солнцем',aspect:'День для важных разговоров и встреч'},
  {quality:'g',moon:'Спокойная лунная фаза',aspect:'День для отдыха и внутренней тишины'},
];
function getWeeklyForecastFallback(){
  const wdNames=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const base=new Date();
  const out=[];
  for(let i=0;i<7;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    const astro=WEEK_ASTRO_POOL[(d.getDate()+i)%WEEK_ASTRO_POOL.length];
    out.push({date:d,day:i===0?'Сегодня':i===1?'Завтра':wdNames[d.getDay()],dayNum:d.getDate(),...astro});
  }
  return out;
}

const WF_CACHE_KEY='fenix_weekly_forecast';
const WF_CACHE_DATE_KEY='fenix_weekly_forecast_date';
const todayISO=()=>new Date().toISOString().slice(0,10);

async function generateWeeklyForecast(){
  const prompt=`НАТАЛЬНАЯ КАРТА:\n${natalSummary()}\nДАТА СЕГОДНЯ: ${todayISO()}\n\nСоставь астрологический прогноз на ближайшие 7 дней (начиная с сегодня), опираясь на лунный календарь и текущие транзиты (Юпитер в Льве, общий фон середины 2026 года). ВАЖНО: не упоминай конкретные проекты (Scrap, Hub, База) и не говори «хорошо для проекта X» — вместо этого используй бытовые формулировки о жизни в целом: «день для порядка в делах», «день для контактов и общения», «день для тишины и отдыха» и т.п.\nВерни ТОЛЬКО JSON строго в формате:\n{"forecast":[{"day":"Сегодня","moon":"краткое описание фазы/знака Луны","aspect":"бытовая формулировка дня, без названий проектов","quality":"g|y|r"}, ... ещё 6 объектов на следующие дни, day — короткое название дня недели]}`;
  const res=await callClaudeJSON(SYS_JSON,prompt);
  const arr=res.forecast||res.days||[];
  if(!Array.isArray(arr)||arr.length===0)throw new Error('EMPTY_FORECAST');
  const wdNames=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const base=new Date();
  return arr.slice(0,7).map((item,i)=>{
    const d=new Date(base);d.setDate(base.getDate()+i);
    return{
      dayNum:d.getDate(),
      day:i===0?'Сегодня':i===1?'Завтра':(item.day||wdNames[d.getDay()]),
      moon:item.moon||'',aspect:item.aspect||'',
      quality:['g','y','r'].includes(item.quality)?item.quality:'g',
    };
  });
}

const currentYM=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};

// Оффлайн-заглушка на случай отсутствия ключа/сети — реальный прогноз

    finance:'Стабильный фон для планирования, но крупные решения лучше отложить до более ясных транзитных окон.',

async function generateMonthlyForecast(){
  const now=new Date();
  const monthName=MN[now.getMonth()];
  const prompt=`НАТАЛЬНАЯ КАРТА:\n${natalSummary()}\nМЕСЯЦ: ${monthName} ${now.getFullYear()}\n\nСоставь развёрнутый астрологический гороскоп на этот месяц целиком, опираясь на натальную карту и текущие транзиты (Юпитер в Льве, общий фон середины 2026 года). Никита управляет металлургическим заводом (Recovery Scrap) и спортивным проектом (Recovery Hub), готовится к марафону.\nВерни ТОЛЬКО JSON строго в формате:\n{"career":"2-3 предложения о карьере и проектах в этом месяце","relationships":"2-3 предложения об отношениях","health":"2-3 предложения о здоровье и энергии","finance":"2-3 предложения о финансах","keyDates":[{"date":"число или диапазон месяца, напр. 6-14","note":"почему этот период важен"}]}`;
  const res=await callClaudeJSON(SYS_JSON,prompt);
  return{
    monthLabel:`${monthName} ${now.getFullYear()}`,
    career:res.career||'',relationships:res.relationships||'',
    health:res.health||'',finance:res.finance||'',
    keyDates:Array.isArray(res.keyDates)?res.keyDates:[],
  };
}

function MonthlyForecastCard(){
  const [forecast,setForecast]=useState(()=>{
    const cachedYM=localStorage.getItem(MF_CACHE_DATE_KEY);
    if(cachedYM===currentYM()){
      try{const c=JSON.parse(localStorage.getItem(MF_CACHE_KEY)||'null');if(c)return c;}catch{}
    }
    return getMonthlyForecastFallback();
  });
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    const cachedYM=localStorage.getItem(MF_CACHE_DATE_KEY);
    if(cachedYM===currentYM())return; // прогноз на этот месяц уже есть — новый запрос не нужен
    let cancelled=false;
    setLoading(true);
    generateMonthlyForecast()
      .then(fresh=>{
        if(cancelled)return;
        setForecast(fresh);
        localStorage.setItem(MF_CACHE_KEY,JSON.stringify(fresh));
        localStorage.setItem(MF_CACHE_DATE_KEY,currentYM());
      })
      .catch(()=>{/* нет ключа/сети — остаёмся на заглушке */})
      .finally(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[]);

  return <div className="advice-card">
    <div className="advice-head">
      <span className="ah-icon">📅</span>
      <span className="ah-title">Гороскоп на месяц · {forecast.monthLabel}</span>
      {loading&&<span style={{marginLeft:'auto',fontSize:10,color:'rgba(255,255,255,.6)'}}>обновляю…</span>}
    </div>
    <div className="advice-sub">
      <div className="advice-sub-head"><span className="as-icon">💼</span><span className="as-title">Карьера</span></div>
      <p>{forecast.career}</p>
    </div>
    <div className="advice-sub">
      <div className="advice-sub-head"><span className="as-icon">❤️</span><span className="as-title">Отношения</span></div>
      <p>{forecast.relationships}</p>
    </div>
    <div className="advice-sub">
      <div className="advice-sub-head"><span className="as-icon">💪</span><span className="as-title">Здоровье</span></div>
      <p>{forecast.health}</p>
    </div>
    <div className="advice-sub">
      <div className="advice-sub-head"><span className="as-icon">💰</span><span className="as-title">Финансы</span></div>
      <p>{forecast.finance}</p>
    </div>
    {forecast.keyDates&&forecast.keyDates.length>0&&<div className="advice-sub">
      <div className="advice-sub-head"><span className="as-icon">🔑</span><span className="as-title">Ключевые даты</span></div>
      {forecast.keyDates.map((k,i)=><p key={i}><b>{k.date}</b> — {k.note}</p>)}
    </div>}
  </div>;
}

function Calendar(){
  const [today,setToday]=useState(()=>new Date());
  const [yr,setYr]=useState(()=>today.getFullYear());
  const [mo,setMo]=useState(()=>today.getMonth());
  const [layer,setLayer]=useState('moon');
  const [sel,setSel]=useState(null);

  // Держим "сегодня" живым: обновляем каждые 5 минут и при возврате на вкладку
  useEffect(()=>{
    const tick=()=>setToday(new Date());
    const iv=setInterval(tick,5*60*1000);
    const onVis=()=>{if(document.visibilityState==='visible')tick();};
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('focus',tick);
    return()=>{clearInterval(iv);document.removeEventListener('visibilitychange',onVis);window.removeEventListener('focus',tick);};
  },[]);

  const dim=new Date(yr,mo+1,0).getDate();
  const fd=(()=>{const d=new Date(yr,mo,1).getDay();return d===0?6:d-1;})();
  const cells=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  while(cells.length%7!==0)cells.push(null);
  const rows=[];for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));
  const prev=()=>mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1);
  const next=()=>mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1);
  const isToday=d=>d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
  const isBday=d=>d===22&&mo===6; // 22 июля — ежегодно, год не важен
  const races=getRaces(); // промежуточные старты — подсветка оранжевым + 🏁
  return <><div className="screen"><div className="pad">
    <div className="h1">📅 Календарь</div>
    <SegControl tabs={[{k:'moon',l:'🌀 Энергия'},{k:'doc',l:'📄 Документы'},{k:'meet',l:'❤️ Встречи'},{k:'intuition',l:'🌙 Интуиция'},{k:'month',l:'📅 Месяц'}]} active={layer} onChange={setLayer}/>
    {layer!=='month'&&<p className="layer-hint">{CAL_LAYERS[layer].hint}</p>}

    {layer==='month'?<MonthlyForecastCard/>:<>
      <div className="cal-nav">
        <button onClick={prev}>‹</button>
        <span>{MN[mo]} {yr}</span>
        <button onClick={next}>›</button>
      </div>
      <div className="wd-row">{WD.map(w=><span key={w}>{w}</span>)}</div>
      {rows.map((row,ri)=><div key={ri} className="day-grid" style={{marginBottom:3}}>
        {row.map((d,ci)=>{
          if(!d)return<div key={ci} className="day-cell"/>;
          const en=getDE(yr,mo+1,d,layer);
          const tod=isToday(d);const hasBday=isBday(d);
          const hasEvent=KEY_DATES.some(k=>matchKeyDate(k,yr,mo,d));
          const dateISO=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const raceHere=races.find(r=>r.date===dateISO);
          // Пункт 1: благоприятный для интуиции лунный день (только для слоя Интуиция)
          const lunarDay=layer==='intuition'?getLunarDayNumber(new Date(yr,mo,d)):null;
          const isIntuitionDay=layer==='intuition'&&!!INTUITION_DAY_NOTE[lunarDay];
          // Единый обработчик открытия дня — используется и для onClick, и для onTouchEnd
          const openDay=(e)=>{
            e.stopPropagation();
            setSel({yr,mo,d});
          };
          return<div key={ci} className="day-cell"
            onClick={openDay}
            onTouchEnd={(e)=>{e.preventDefault();openDay(e);}}
            style={{background:tod?C.indigo:raceHere?'#FFF3E0':'#fff',
              borderColor:tod?C.indigo:raceHere?C.amber:'transparent'}}>
            <span style={{color:tod?'#fff':raceHere?'#E65100':C.text,fontWeight:tod||hasEvent||raceHere?700:400}}>{d}</span>
            {hasBday&&<span className="star">⭐</span>}
            {raceHere&&<span className="day-cell-race">🏁</span>}
            {isIntuitionDay&&<span className="day-cell-race" style={{fontSize:11}}>🌙</span>}
            {/* Пункт 7: акцентная полоса качества дня внизу ячейки вместо заливки фона */}
            {!tod&&!raceHere&&layer!=='intuition'&&<span className="day-cell-bar" style={{background:EC[en]}}/>}
          </div>;
        })}
      </div>)}
      {layer!=='intuition'&&<div className="legend">
        {[['g','Хорошо'],['y','Осторожно'],['r','Стоп']].map(([t,l])=><div key={t} className="legend-item">
          <div className="legend-dot" style={{background:EB[t],borderColor:EC[t]}}/><span className="leg-label">{l}</span>
        </div>)}
      </div>}
      <p style={{fontSize:11,color:C.sub,textAlign:'center',marginTop:8,marginBottom:16}}>Нажми на дату — подробности ниже</p>

      {/* Изменение (п.2): вместо модалки — встроенный блок под сеткой календаря */}
      <DayDetails key={sel?`${sel.yr}-${sel.mo}-${sel.d}`:'empty'} sel={sel} layer={layer}/>
    </>}

    <div className="card">
      <div className="card-title">🔑 Ключевые даты</div>
      {KEY_DATES.map((k,i)=><div key={i} style={{display:'flex',marginBottom:10}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:EC[k.t],marginTop:5,marginRight:10,flexShrink:0}}/>
        <div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{k.d}</div><div style={{fontSize:11,color:C.sub}}>{k.l}</div></div>
      </div>)}
    </div>
  </div></div>
  </>;
}

/* ======= ORACLE ======= */
/* ======= PLAN PARSER (глобальная функция) =======
   Изменение (п.2): расширены ключевые слова для типов тренировок
   и добавлен отдельный слой точного определения интенсивности —
   он смотрит на конкретные фразы в тексте (пульс, темп, слова
   «легко»/«интервалы» и т.д.) и уточняет интенсивность поверх
   значения по умолчанию для типа. Структура возвращаемого объекта
   не изменена — Body и Oracle работают как прежде. */
function parsePlan(raw){
  if(!raw||!raw.trim())return[];
  const DAYS={
    'понедельник':{s:'Пн',i:0},'вторник':{s:'Вт',i:1},'среда':{s:'Ср',i:2},
    'четверг':{s:'Чт',i:3},'пятница':{s:'Пт',i:4},'суббота':{s:'Сб',i:5},'воскресенье':{s:'Вс',i:6},
  };
  const TYPES=[
    {w:['силовая','гантел','планка','мостик','ягодичн','круговое','приседан','выпад','пресс','турник','тяга'],
      type:'strength',icon:'💪',label:'Силовая',intensity:'low'},
    {w:['стадион','интервал','повторен','500м','1000м','400м','200м','отрезк','× ','x ','ускорен'],
      type:'interval',icon:'⚡',label:'Интервалы',intensity:'high'},
    {w:['темповый','темп','в темпе 4:','в темпе 3:','марафонский темп'],
      type:'tempo',icon:'🔥',label:'Темповый',intensity:'high'},
    {w:['длительный','длительная','длинный','длинная','20 км','22 км','24 км','18 км','26 км','16 км'],
      type:'long',icon:'🏃',label:'Длительный',intensity:'medium'},
    {w:['восстановительный','восстановительная','кросс','лёгкий бег','легкий бег','аэробн','восстановит','до 130','до 135'],
      type:'easy',icon:'🏃',label:'Кросс',intensity:'low'},
    {w:['соревновани','старт','гонка','симуляция','финиш','чемпионат'],
      type:'race',icon:'🏁',label:'Соревновательная',intensity:'high'},
    {w:['отдых','выходной','rest','релакс','восстановление только'],
      type:'rest',icon:'😴',label:'Отдых',intensity:'none'},
  ];
  const INT_COLOR={
    none:{bg:'#EDE7F6',text:'#4527A0',dot:'#7C4DFF',label:'Отдых'},
    low: {bg:'#E8F5E9',text:'#2E7D32',dot:'#43A047',label:'Лёгкая'},
    medium:{bg:'#FFF8E1',text:'#E65100',dot:'#FFA000',label:'Средняя'},
    high:{bg:'#FFEBEE',text:'#C62828',dot:'#E53935',label:'Интенсивная'},
  };
  // Уточнение интенсивности по конкретным фразам — переопределяет
  // дефолт типа, если в тексте есть явные маркеры пульса/темпа/усилия.
  function refineIntensity(lc,fallback){
    if(fallback==='none')return fallback; // «отдых» не переопределяем
    if(/интервал|повторен|ускорени|ускорен|соревновани|\bстарт\b/.test(lc))return'high';
    if(/до\s*14[0-5]|темп\s*4:/.test(lc))return'medium';
    if(/до\s*13[0-5]|\bлегко\b|очень легко/.test(lc))return'low';
    return fallback;
  }
  // Пункт 1: время суток тренировки — сперва явные слова в тексте, если их
  // нет — используем тип тренировки как разумный фолбэк.
  function detectTimeOfDay(lc,type){
    if(/\bутр[оа]|утренн/.test(lc))return'morning';
    if(/\bвечер|вечерн|стадион|темпов/.test(lc))return'evening';
    if(type==='easy'||type==='long')return'morning';
    if(type==='interval'||type==='tempo'||type==='strength')return'evening';
    return null; // тип не даёт однозначного ответа (напр. rest/race/other) — нейтрально
  }
  const parts=raw.split(/(понедельник|вторник|среда|четверг|пятница|суббота|воскресенье)/gi);
  const result=[];
  for(let i=0;i<parts.length;i++){
    const lower=parts[i].trim().toLowerCase();
    const dayInfo=DAYS[lower];
    if(dayInfo){
      const content=(parts[i+1]||'').replace(/^[\.\:\s]+/,'').trim();
      const lc=content.toLowerCase();
      let matched=TYPES.find(t=>t.w.some(w=>lc.includes(w)));
      if(!matched) matched={type:'other',icon:'📋',label:'Тренировка',intensity:'medium'};
      const finalIntensity=refineIntensity(lc,matched.intensity);
      const col=INT_COLOR[finalIntensity];
      result.push({
        day:dayInfo.s, dayFull:parts[i].trim(), dayIdx:dayInfo.i,
        type:matched.type, icon:matched.icon, label:matched.label,
        intensity:finalIntensity,
        timeOfDay:detectTimeOfDay(lc,matched.type),
        bg:col.bg, textColor:col.text, dot:col.dot, intLabel:col.label,
        desc:content.replace(/\n+/g,' ').trim(),
        descShort:content.replace(/\n+/g,' ').trim().slice(0,140),
        raw:content,
      });
      i++;
    }
  }
  const ORDER=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  return result.sort((a,b)=>ORDER.indexOf(a.day)-ORDER.indexOf(b.day));
}

const TASK_OPTIONS=['Работа','Финансы','Отношения','Здоровье','Творчество','Отдых'];

// Пункт 2: разбираем ответ Оракула на секции по углам зрения — 🔮 Астрология,
// 🧠 Психология, ✨ Эзотерика. Секций в ответе может быть от 1 до 3, в зависимости
// от того, что выбрал пользователь. Если ни один маркер не найден (например,
// выбор не задан и Claude дал единый цельный ответ) — тихо откатываемся к обычному тексту.
function splitOracleSections(text){
  if(!text)return null;
  const MARKERS=[
    {key:'astro',re:/🔮\s*АСТРОЛОГИЯ/i,title:'🔮 АСТРОЛОГИЯ',cls:'astro-block'},
    {key:'psycho',re:/🧠\s*ПСИХОЛОГИЯ/i,title:'🧠 ПСИХОЛОГИЯ',cls:'psyche-block'},
    {key:'esoteric',re:/✨\s*ЭЗОТЕРИКА/i,title:'✨ ЭЗОТЕРИКА',cls:'esoteric-block'},
  ];
  const found=MARKERS
    .map(m=>{const match=text.match(m.re);return match?{...m,index:match.index,len:match[0].length}:null;})
    .filter(Boolean)
    .sort((a,b)=>a.index-b.index);
  if(found.length===0)return null;
  const sections=[];
  for(let i=0;i<found.length;i++){
    const start=found[i].index+found[i].len;
    const end=i+1<found.length?found[i+1].index:text.length;
    const body=text.slice(start,end).trim();
    if(body)sections.push({key:found[i].key,title:found[i].title,cls:found[i].cls,body});
  }
  return sections.length>0?sections:null;
}
function OracleAnswerBlock({text}){
  const sections=splitOracleSections(text);
  if(!sections)return <p className="oracle-text">{text}</p>;
  return <>{sections.map(s=>
    <div key={s.key} className={s.cls}>
      <div className="apb-head">{s.title}</div>
      <p className="oracle-text">{s.body}</p>
    </div>
  )}</>;
}

// Пункт 6: категоризация вопросов Оракула по ключевым словам — для Аналитики
const ORACLE_CATEGORY_KEYWORDS={
  'Scrap':['scrap','металл','завод','лом'],
  'Hub':['hub','сайт','лендинг'],
  'База':['база отдых','участ','девелоп','загород'],
  'Переговоры':['перегово','встреч','контракт','партнёр','сделк'],
  'Здоровье':['здоровь','самочувств','сон','энерги','устал'],
  'Тренировки':['тренир','марафон','бег','кросс','интервал','темп'],
  'Отношения':['отношени','семь','друз','девушк','конфликт'],
};
function categorizeQuestion(text){
  const lc=(text||'').toLowerCase();
  const matched=Object.keys(ORACLE_CATEGORY_KEYWORDS).filter(cat=>ORACLE_CATEGORY_KEYWORDS[cat].some(w=>lc.includes(w)));
  return matched.length>0?matched:['Другое'];
}
function getOracleAnalytics(hist){
  const catCounts={};const catRatings={};
  const WD=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const dowCounts=[0,0,0,0,0,0,0];
  hist.forEach(h=>{
    categorizeQuestion(h.q).forEach(c=>{
      catCounts[c]=(catCounts[c]||0)+1;
      if(h.rating>0){(catRatings[c]=catRatings[c]||[]).push(h.rating);}
    });
    try{
      const d=new Date(h.date+'T00:00:00');
      const dow=d.getDay();
      dowCounts[dow===0?6:dow-1]++;
    }catch{}
  });
  const topThemes=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const avgRatings={};
  Object.keys(catRatings).forEach(c=>{
    const arr=catRatings[c];
    avgRatings[c]=(arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1);
  });
  return{topThemes,dowCounts,avgRatings,WD};
}
function AnalyticsView({hist}){
  if(hist.length===0)return<p style={{fontSize:12,color:C.sub,textAlign:'center',padding:'20px 0'}}>Пока нет вопросов для анализа.</p>;

  const maxDow=Math.max(...a.dowCounts,1);

function buildMinorArcana(){
  const cards=[];
  Object.entries(TAROT_SUITS).forEach(([suitKey,suit])=>{
    TAROT_RANKS.forEach(rank=>{
      cards.push({
        name:`${rank.name} ${suit.name}`,symbol:suit.symbol,suit:suitKey,
        main:`Карта говорит про ${suit.theme} — сейчас в фокусе ${rank.main}.`,
        shadow:`Теневая сторона: ${rank.shadow}.`,
        positive:`Как использовать энергию карты: ${rank.positive}.`,
      });
    });
  });
  return cards;
}

function drawTarotCard(sphere){
  const card=TAROT_DECK[Math.floor(Math.random()*TAROT_DECK.length)];
  const lens=(sphere==='finance'||sphere==='relationship')?TAROT_SPHERE_LENS[sphere][card.suit]:null;
  return{...card,sphere,lens};
}

      setFollowUp('');
    }catch(e){setErr(e.message==='NO_KEY'?'Добавь ключ ИИ-ассистента (Ещё → сбросить).':'Ошибка: '+e.message.slice(0,120));}

  };

  const saveHist=(m,q2,resp)=>{
    const entry={id:Date.now(),mode:m,q:q2,date:new Date().toISOString().slice(0,10),resp,outcome:null,rating:0};

    saveHist('tarot',`Карта дня — ${SPHERE_LABEL[sphere]}`,respText);

  const saveRating=n=>{
    setRating(n);
    localStorage.setItem('fenix_last_rating',String(n));

  const copyAnswer=()=>{
    const txt=convo.length>0
      ?convo.map(m=>`${m.role==='user'?'Ты':'Феникс'}: ${m.text}`).join('\n\n')
      :(ans?.text||(ans?.res?JSON.stringify(ans.res,null,2):''));

  const markOut=(id,v)=>{const next=hist.map(h=>h.id===id?{...h,outcome:v}:h);setHist(next);localStorage.setItem('fenix_oracle',JSON.stringify(next));};

  const toggleMode=k=>setModes(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);

  // Два шаблона для послеобеденного спада — подставляют текущие дату и время:

Дай мне краткий, конкретный план:
1. Что съесть или выпить прямо сейчас (конкретные продукты/напитки).
2. Какое короткое действие (2–5 минут) поможет вернуть ясность и энергию.

Учти мою карту, транзиты и подготовку к марафону.`);
  };

  const fillSlumpAnalysis=()=>{
    const now=new Date();
    const dateStr=now.toLocaleDateString('ru-RU');
    const timeStr=now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});

Мне нужны не только рекомендации по еде и напиткам, но и:
1. Что я могу сделать прямо сейчас (2–5 минут), чтобы вернуть фокус и энергию.
2. Как реагировать на это состояние, чтобы не провалить остаток дня.
3. Что я могу изменить сегодня вечером или завтра, чтобы предотвратить такой спад.

Учти мою натальную карту, текущие транзиты, подготовку к марафону. Дай чёткие, выполнимые советы без общих фраз.`);
  };

  // Пункт 1Б: четыре новых шаблона в режиме «Вопрос». Все подставляют текущие

  };

  const fillMeetingPrep=()=>{

          <button className="lens-btn off" onClick={()=>pickTarotSphere('finance')}>💰 Финансы</button>

          <button className="lens-btn off" onClick={()=>pickTarotSphere('general')}>✨ Общее</button>
        </div>

      {/* Пункт 2: результат — красивая карточка с тремя значениями */}
      {tarotCard&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>

          <div style={{background:'rgba(255,255,255,.08)',borderRadius:12,padding:12,marginBottom:8,textAlign:'left'}}>
            <div style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:'uppercase',marginBottom:4}}>Основное значение</div>
            <div style={{fontSize:12.5,color:'rgba(255,255,255,.92)',lineHeight:1.5}}>{tarotCard.main}</div>
          </div>
          <div style={{background:'rgba(255,255,255,.08)',borderRadius:12,padding:12,marginBottom:8,textAlign:'left'}}>
            <div style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:'uppercase',marginBottom:4}}>Теневое значение</div>
            <div style={{fontSize:12.5,color:'rgba(255,255,255,.92)',lineHeight:1.5}}>{tarotCard.shadow}</div>

          <div style={{background:'rgba(255,255,255,.08)',borderRadius:12,padding:12,textAlign:'left'}}>

            <div style={{fontSize:12.5,color:'rgba(255,255,255,.92)',lineHeight:1.5}}>{tarotCard.positive}</div>
          </div>
          {tarotCard.lens&&<div style={{marginTop:10,fontSize:11.5,color:'rgba(255,255,255,.7)',fontStyle:'italic',lineHeight:1.5}}>
            ✨ {tarotCard.lens}
          </div>}
        </div>
        <button onClick={()=>{setTarotCard(null);}} style={{width:'100%',marginTop:10,padding:10,borderRadius:10,
          border:`1px solid ${C.border}`,background:'transparent',color:C.sub,fontSize:12,cursor:'pointer'}}>
          Выбрать другую сферу
        </button>
        <p style={{fontSize:10.5,color:C.sub,textAlign:'center',marginTop:8}}>Карта сохранена в истории Оракула</p>

    </div>}

    {/* ---- FREE QUESTION ---- */}
    {mode==='quick'&&<div className="card">
      <label className="label11">Вопрос или ситуация</label>
      <textarea className="oracle-input" value={q} onChange={e=>setQ(e.target.value)} placeholder="Введите ваш вопрос"/>
      <div style={{marginTop:10}}>
        <label className="label11">Выбери угол зрения (можно несколько)</label>
        <div className="lens-row">
          {LENS_OPTIONS.map(o=><button key={o.key} className={`lens-btn ${modes.includes(o.key)?'on':'off'}`}
            onClick={()=>toggleMode(o.key)}>{o.label}</button>)}
        </div>
      </div>
      {err&&<p style={{color:C.red,fontSize:12,marginTop:6}}>{err}</p>}
      <button className="ask-btn" onClick={ask} disabled={busy}>{busy?'Спрашиваю…':'Спросить'}</button>
    </div>}

    {/* ---- ELECTION ---- */}
    {mode==='election'&&<div className="card">
      <label className="label11">Действие</label>
      <input className="oracle-input one" value={action} onChange={e=>setAction(e.target.value)} placeholder="напр. «подписать договор поставки»"/>
      <div style={{display:'flex',gap:8,marginTop:8}}>

      {convo.map((m,i)=>m.role==='user'
        ?<div key={i} className="convo-user">Ты: {m.text}</div>
        :<OracleAnswerBlock key={i} text={m.text}/>

      {/* Пункт 1: индикатор во время отправки следующего сообщения в этой же беседе */}

      <StarRating rating={rating} onRate={saveRating}/>

      {/* Пункт 1: поле для продолжения диалога */}
      <div className="followup-row">
        <textarea className="oracle-input" style={{minHeight:46,maxHeight:110}}

          placeholder="Написать ответ или следующий вопрос…"/>
        <button className="followup-send" onClick={sendFollowUp} disabled={followBusy||!followUp.trim()}>
          {followBusy?'…':'➡️'}

      </div>

    {/* ---- ANSWER (election JSON) ---- */}
    {ans&&ans.mode==='election'&&ans.res&&<div className="card">
      <div className="elect-box">
        <div style={{fontSize:11,color:C.sub}}>Лучший момент</div>
        <div className="big">{ans.res.bestDay}{ans.res.bestTime?` · ${ans.res.bestTime}`:''}</div>
      </div>
      <div className="field"><label>Почему</label><p>{ans.res.why}</p></div>
      <div className="field"><label>Избегать</label><p>{ans.res.avoid}</p></div>
      <button className={`copy-btn${copied?' copied':''}`} onClick={copyAnswer}>{copied?'✓ Скопировано':'Скопировать'}</button>
      <StarRating rating={rating} onRate={saveRating}/>
    </div>}

    {/* ---- HISTORY ---- */}
    {hist.length>0&&<div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div className="card-title" style={{marginBottom:0}}>История</div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setHistView('list')} style={{fontSize:11,fontWeight:histView==='list'?700:400,
            color:histView==='list'?C.indigo:C.sub,background:'none',border:'none',cursor:'pointer'}}>Все вопросы</button>
          <span style={{color:C.border}}>·</span>
          <button onClick={()=>setHistView('analytics')} style={{fontSize:11,fontWeight:histView==='analytics'?700:400,
            color:histView==='analytics'?C.indigo:C.sub,background:'none',border:'none',cursor:'pointer'}}>Аналитика</button>
        </div>
      </div>
      {histView==='analytics'?<AnalyticsView hist={hist}/>:<>
      {hist.slice(0,10).map(h=>{
        const exp=expandedId===h.id;
        return<div key={h.id} className="hist-item">
          <div className="hist-trigger">
            <div style={{flex:1,cursor:'pointer'}} onClick={()=>setExpandedId(exp?null:h.id)}>
              <div className="hist-meta">{h.date}{h.rating>0?` · ${'⭐'.repeat(h.rating)}`:''}</div>
              <div className="hist-q">{h.q.slice(0,70)}{h.q.length>70?'…':''}</div>
            </div>
            <button className="hist-del" onClick={()=>deleteHistItem(h.id)} title="Удалить">🗑</button>
            <span className="hist-chevron" onClick={()=>setExpandedId(exp?null:h.id)} style={{cursor:'pointer'}}>{exp?'▲':'▼'}</span>
          </div>
          {exp&&<div className="hist-body">
            {typeof h.resp==='string'
              ?<div style={{maxHeight:260,overflow:'auto'}}><OracleAnswerBlock text={h.resp}/></div>
              :<p className="oracle-text" style={{fontSize:12,maxHeight:200,overflow:'auto'}}>{JSON.stringify(h.resp,null,2)}</p>}
            <div className="hist-fb">
              <span>Сбылось?</span>
              <button onClick={()=>markOut(h.id,true)} style={{color:h.outcome===true?C.green:C.sub}}>да </button>

            </div>
          </div>}
        </div>;
      })}
      </>}
    </div>}
  </div></div>;
}

/* ======= TEAM ======= */
function Team(){
  const [tab,setTab]=useState('mine');
  const [team,setTeam]=useState(()=>{try{const s=localStorage.getItem('fenix_team');return s?JSON.parse(s):TEAM_MINE_DEF;}catch{return TEAM_MINE_DEF;}});
  const saveTeam=next=>{setTeam(next);localStorage.setItem('fenix_team',JSON.stringify(next));};
  const [adding,setAdding]=useState(false);
  const [newP,setNewP]=useState({name:'',role:'',date:''});
  const [avIdx,setAvIdx]=useState(0);
  const addPerson=()=>{
    if(!newP.name.trim())return;
    const p={id:Date.now(),name:newP.name.trim(),role:newP.role.trim()||'Команда',av:AVARS[avIdx],date:newP.date,plus:[],minus:[],today:'Добавь дату рождения для персонального совета.'};
    saveTeam([...team,p]);setAdding(false);setNewP({name:'',role:'',date:''});setAvIdx(0);
  };
  const delPerson=id=>{if(window.confirm('Удалить из команды?'))saveTeam(team.filter(p=>p.id!==id));};
  const [form,setForm]=useState({name:'',date:'',time:'',city:''});
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [err,setErr]=useState('');
  const analyze=async()=>{
    setBusy(true);setRes(null);setErr('');
    try{
      // Изменение (п.3): передаём все три поля явно (дата/время/место),
      // пустые поля заменяем на «неизвестно», не блокируя анализ.
      const candDate=form.date.trim()||'неизвестно';
      const candTime=form.time.trim()||'неизвестно';
      const candCity=form.city.trim()||'неизвестно';
      const candDesc=`Дата рождения: ${candDate}. Время рождения: ${candTime}. Место рождения: ${candCity}.`;
      const r=await callClaudeJSON(SYS_JSON,`НАТАЛЬНАЯ КАРТА НИКИТЫ:\n${natalSummary()}\nКАНДИДАТ (${form.name||'без имени'}): ${candDesc}${candTime==='неизвестно'?' Время неизвестно — строй анализ по солнечным/лунным аспектам без точного асцендента.':''}${candCity==='неизвестно'?' Место неизвестно — не учитывай локальные астрокартографические линии.':''}\nДеловая синастрия (Меркурий, Марс, Сатурн, Юпитер).\nВерни ТОЛЬКО JSON: {"verdict":"...","score":"green|yellow|red","pros":["..."],"cons":["..."],"avoid":"..."}`);
      setRes(r);
    }catch(e){setErr(e.message==='NO_KEY'?'Добавь API-ключ.':'Ошибка: '+e.message.slice(0,100));}
    finally{setBusy(false);}
  };
  const transferToMine=()=>{
    if(!form.name.trim())return;
    const p={id:Date.now(),name:form.name,role:'Команда',av:'👤',date:form.date,
      plus:res?(res.pros||[]).slice(0,2):[],minus:res?(res.cons||[]).slice(0,1):[],
      today:res?`Вердикт синастрии: ${res.verdict}`:'Синастрия выполнена.'};
    saveTeam([...team,p]);setForm({name:'',date:'',time:'',city:''});setRes(null);setTab('mine');
  };
  const tf=k=>v=>setForm(p=>({...p,[k]:v}));

/* ======= TRAINING PLAN CARD ======= */
function TrainingPlanCard({onPlanSaved}){
  const [plan,setPlan]=useState(()=>
    localStorage.getItem('trainingPlan')||localStorage.getItem('fenix_training_plan')||'');
  const [editing,setEditing]=useState(!plan);
  const [draft,setDraft]=useState(plan);
  const [saved,setSaved]=useState(false);

  const savePlan=()=>{
    const trimmed=draft.trim();
    localStorage.setItem('trainingPlan',trimmed);
    setPlan(trimmed);setEditing(false);setSaved(true);
    onPlanSaved&&onPlanSaved(trimmed); // сообщаем Body — карточки перерисуются сразу
    setTimeout(()=>setSaved(false),2000);
  };
  const clearPlan=()=>{
    if(window.confirm('Удалить план тренера?')){
      localStorage.removeItem('trainingPlan');
      localStorage.removeItem('fenix_training_plan');
      setPlan('');setDraft('');setEditing(true);
      onPlanSaved&&onPlanSaved('');
    }
  };

  return <div className="card">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text}}>📋 План тренера</div>
      {plan&&!editing&&<button onClick={()=>{setDraft(plan);setEditing(true);}}
        style={{fontSize:12,color:C.indigo,background:'none',border:'none',cursor:'pointer'}}>Изменить</button>}
    </div>

    {editing?<>
      <p style={{fontSize:11,color:C.sub,marginBottom:8,lineHeight:1.5}}>
        Вставь план недели от тренера — в любом формате, как есть.
        Феникс распознает дни и покажет их карточками выше.
      </p>
      <textarea
        value={draft}
        onChange={e=>setDraft(e.target.value)}
        placeholder={"Понедельник. Силовая, 2-3 серии: планка, мостик...\nВторник. Стадион: разминка 3 км + 6×500м...\nСреда. Кросс 10 км до 130 уд.\n..."}
        style={{width:'100%',minHeight:160,padding:12,borderRadius:10,
          border:`1.5px solid ${C.indigo}`,fontSize:12,color:C.text,
          background:C.bg,resize:'none',fontFamily:'inherit',lineHeight:1.65,marginBottom:10}}
      />
      <div style={{display:'flex',gap:8}}>
        <button onClick={savePlan}
          style={{flex:1,padding:11,borderRadius:10,border:'none',
          background:saved?C.green:C.indigo,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',
          transition:'background .3s'}}>
          {saved?'✓ Сохранено':'Сохранить план'}
        </button>
        {plan&&<button onClick={()=>setEditing(false)}
          style={{padding:11,borderRadius:10,border:`1px solid ${C.border}`,
          background:'transparent',color:C.sub,fontSize:13,cursor:'pointer'}}>Отмена</button>}
      </div>
    </>:<>
      {/* Только короткая подпись-статус — сами карточки дней уже показаны выше в PlanDayCards */}
      <div style={{display:'flex',alignItems:'center',gap:10,background:C.greenLight,
        borderRadius:10,padding:'12px 14px',marginBottom:10}}>
        <span style={{fontSize:18}}>✅</span>
        <p style={{fontSize:12,color:C.text,lineHeight:1.5}}>
          План на неделю загружен. Чтобы обновить — вставь новый текст и нажми «Сохранить».
        </p>
      </div>
      <button onClick={clearPlan}
        style={{width:'100%',padding:9,borderRadius:10,border:`1px solid ${C.border}`,
        background:'transparent',color:C.sub,fontSize:12,cursor:'pointer'}}>
